<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetirePlan QC</title>
  <style>
    /* Réinitialisation de base pour correspondre au design system */
    body {
      margin: 0;
      padding: 0;
      background-color: #F0F4F8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    * {
      box-sizing: border-box;
    }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script crossorigin src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;
    const { ComposedChart, AreaChart, Area, LineChart, Line, XAxis, YAxis,
            CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine } = Recharts;

    // ── DESIGN SYSTEM ────────────────────────────────────────
    const C = {
      bg:'#F0F4F8', card:'#FFFFFF', navy:'#0F172A', blue:'#2563EB',
      teal:'#0D9488', green:'#10B981', amber:'#F59E0B', red:'#EF4444',
      purple:'#7C3AED', muted:'#64748B', border:'#E2E8F0',
      sh:'0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04)',
      shHover:'0 4px 12px rgba(0,0,0,.12)',
    };

    // ── CONSTANTS ────────────────────────────────────────────
    const ACCT_DEF = {
      REER:   {label:'REER',           icon:'🏦', color:'#2563EB', tax:'Déductible · Imposable au retrait'},
      CELI:   {label:'CÉLI',           icon:'🌱', color:'#10B981', tax:'Libre d\'impôt'},
      NONREG: {label:'Non enregistré', icon:'📈', color:'#F59E0B', tax:'Gains en capital imposables'},
      IMMO:   {label:'Immobilier',     icon:'🏠', color:'#7C3AED', tax:'Valeur nette estimée'},
      AUTRE:  {label:'Autre actif',    icon:'💼', color:'#64748B', tax:'Actif personnalisé'},
    };

    const RISKS = {
      low:   {label:'Faible',  vol:.05, color:C.green},
      medium:{label:'Modéré',  vol:.12, color:C.amber},
      high:  {label:'Élevé',   vol:.20, color:C.red},
    };

    const STRATS = {
      'celi-first': {label:'CÉLI d\'abord',   order:['CELI','NONREG','REER','IMMO','AUTRE']},
      'reer-first': {label:'REER d\'abord',   order:['REER','NONREG','CELI','IMMO','AUTRE']},
      'balanced':   {label:'Proportionnel',   order:null},
    };

    const uid = () => Math.random().toString(36).slice(2,8);

    const DEF_ACCOUNTS = [
      {id:uid(),name:'REER',   type:'REER',   balance:50000, contribAmt:10000,contribFreq:'annual',contribStart:25,contribEnd:65,oneTime:[],rate:6,risk:'medium'},
      {id:uid(),name:'CÉLI',   type:'CELI',   balance:20000, contribAmt:6000, contribFreq:'annual',contribStart:25,contribEnd:65,oneTime:[],rate:5,risk:'low'},
    ];
    const DEF_WITHDRAWALS = [{id:uid(),startAge:65,endAge:100,amount:45000,type:'fixed'}];
    const DEF_PARAMS = {ageFrom:25,ageTo:95,inflation:2.5,salary:80000,ageRRQ:65,ageSV:65,ageSRG:60,strategy:'celi-first'};

    // ── MATH ────────────────────────────────────────────────
    function randNorm(){
      let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();
      return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
    }
    function fmtK(v,d=0){
      if(!isFinite(v)||isNaN(v))return'—';
      if(Math.abs(v)>=1e6)return(v/1e6).toFixed(1)+'M$';
      if(Math.abs(v)>=1000)return(v/1000).toFixed(d)+'k$';
      return Math.round(v)+'$';
    }
    function fmtCAD(v){return Math.round(v).toLocaleString('fr-CA')+' $';}

    function calcRRQ(age,aR,sal){
      if(age<aR)return 0;
      let b=Math.min(sal*.25,15888),d=aR-65;
      if(d<0)b*=(1+d*.054);else if(d>0)b*=(1+Math.min(d,7)*.042);
      return b;
    }
    function calcSV(age,aSV){
      if(age<aSV)return 0;
      return 8000*(1+.072*Math.max(0,aSV-65));
    }
    function calcSRG(age,aSV,aSRG,inc,sv){
      if(age<aSV||age<aSRG)return 0;
      return Math.max(0,12000-Math.max(0,inc-sv)*.5);
    }
    function calcTax(inc){
      if(inc<=0)return 0;
      const f=[55867,111733,173205],fr=[.15,.205,.26,.33];
      const q=[49275,98540,119910],qr=[.15,.20,.2575,.2975];
      let t=0,p=0;
      for(let i=0;i<4;i++){const l=i<f.length?f[i]:inc+1,x=Math.min(inc,l)-p;t+=Math.max(0,x)*fr[i];p=l;if(inc<=l)break;}
      p=0;
      for(let i=0;i<4;i++){const l=i<q.length?q[i]:inc+1,x=Math.min(inc,l)-p;t+=Math.max(0,x)*qr[i];p=l;if(inc<=l)break;}
      return Math.max(0,t-.3*15705);
    }

    // ── SIMULATION ──────────────────────────────────────────
    function getPriorityIds(strategy,accounts){
      const order=STRATS[strategy]?.order;
      if(!order)return accounts.map(a=>a.id);
      const byType={};
      accounts.forEach(a=>{if(!byType[a.type])byType[a.type]=[];byType[a.type].push(a.id);});
      const ids=[];
      order.forEach(t=>{if(byType[t])ids.push(...byType[t]);});
      accounts.forEach(a=>{if(!ids.includes(a.id))ids.push(a.id);});
      return ids;
    }

    function runSim(accounts,withdrawals,params,shocks=null){
      if(!accounts.length)return[];
      const {ageFrom,ageTo,salary,ageRRQ,ageSV,ageSRG,strategy}=params;
      const bals={};accounts.forEach(a=>bals[a.id]=a.balance);
      const pids=getPriorityIds(strategy,accounts);
      const results=[];

      for(let age=ageFrom;age<=ageTo;age++){
        const yr=age-ageFrom;
        // Growth
        accounts.forEach(a=>{
          const r=(a.rate/100)+(shocks?(shocks[a.id]?.[yr]??0):0);
          bals[a.id]=Math.max(0,bals[a.id]*(1+r));
        });
        // Recurring contribs
        accounts.forEach(a=>{
          if(age<a.contribStart||age>a.contribEnd)return;
          bals[a.id]+=(a.contribFreq==='monthly'?a.contribAmt*12:a.contribAmt);
        });
        // One-time contribs
        accounts.forEach(a=>(a.oneTime||[]).forEach(ot=>{if(ot.age===age)bals[a.id]+=ot.amount;}));

        const rrq=calcRRQ(age,ageRRQ,salary);
        const sv=calcSV(age,ageSV);
        const srg=calcSRG(age,ageSV,ageSRG,0,sv);
        const gov=rrq+sv+srg;
        const total=Object.values(bals).reduce((s,v)=>s+v,0);

        let needed=0;
        withdrawals.forEach(w=>{
          if(age<w.startAge||age>w.endAge)return;
          needed+=w.type==='fixed'?w.amount:total*(w.amount/100);
        });

        let fromPort=Math.max(0,needed-gov);
        if(STRATS[strategy]?.order){
          for(const id of pids){if(fromPort<=0)break;const t=Math.min(bals[id]||0,fromPort);bals[id]-=t;fromPort-=t;}
        } else {
          const tt=Object.values(bals).reduce((s,v)=>s+v,0)||1;
          accounts.forEach(a=>{const sh=(bals[a.id]/tt)*fromPort;bals[a.id]=Math.max(0,bals[a.id]-sh);});
        }

        const totalBal=Object.values(bals).reduce((s,v)=>s+v,0);
        const tax=needed>gov?calcTax(Math.max(0,needed-gov)):0;
        results.push({age,totalBalance:Math.round(totalBal),gov,rrq,sv,srg,withdrawal:needed,tax:Math.round(tax),net:Math.round(needed+gov-tax),balances:{...bals}});
        if(totalBal<=0){for(let a2=age+1;a2<=ageTo;a2++)results.push({age:a2,totalBalance:0,gov,rrq,sv,srg,withdrawal:needed,tax:0,net:0,balances:{}});break;}
      }
      return results;
    }

    function runMC(accounts,withdrawals,params,N=180){
      if(!accounts.length)return null;
      const runs=[];let ok=0;
      for(let i=0;i<N;i++){
        const sh={};
        accounts.forEach(a=>{
          const vol=RISKS[a.risk]?.vol||.12;sh[a.id]={};
          for(let y=0;y<=(params.ageTo-params.ageFrom+1);y++)sh[a.id][y]=randNorm()*vol;
        });
        const res=runSim(accounts,withdrawals,params,sh);
        runs.push(res);
        if((res[res.length-1]?.totalBalance||0)>0)ok++;
      }
      const len=runs[0]?.length||0;
      const chartData=[];
      for(let i=0;i<len;i++){
        const vals=runs.map(r=>r[i]?.totalBalance||0).sort((a,b)=>a-b);
        const p=(f)=>Math.max(0,vals[Math.floor(N*f)]||0);
        const p10=p(.10),p25=p(.25),p50=p(.50),p75=p(.75),p90=p(.90);
        chartData.push({age:runs[0][i].age,p10,p25,p50,p75,p90,
          b1:Math.max(0,p25-p10),b2:Math.max(0,p75-p25),b3:Math.max(0,p90-p75)});
      }
      return {chartData,successRate:Math.round(ok/N*100),N};
    }

    function getSuggestions(sim,params,accounts,mc){
      const s=[];if(!sim.length)return s;
      const sr=mc?.successRate??100;
      const hasRRQ=accounts.some(a=>a.type==='REER');
      const hasCELI=accounts.some(a=>a.type==='CELI');
      const avgRate=accounts.reduce((s,a)=>s+a.rate,0)/Math.max(accounts.length,1);
      if(sr<70)s.push({lvl:'danger', icon:'🚨', txt:`Probabilité de succès à ${sr} %. Augmenter les contributions de 10–15 % ou réduire les retraits planifiés.`});
      else if(sr<85)s.push({lvl:'warning',icon:'⚠️', txt:`Probabilité ${sr} %. Ajouter 5 000 $/an dans le CÉLI améliorerait considérablement ta retraite.`});
      if(!hasCELI)s.push({lvl:'info',   icon:'🌱', txt:'Aucun CÉLI détecté. Un CÉLI est fiscalement optimal : les retraits sont totalement libres d\'impôt.'});
      if(params.ageRRQ<65)s.push({lvl:'info',icon:'🕐',txt:`RRQ à ${params.ageRRQ} ans = pénalité permanente de ${((65-params.ageRRQ)*5.4).toFixed(0)} %. Attendre 65 ans, ou idéalement 70 ans (+42 %).`});
      if(avgRate<4&&accounts.length)s.push({lvl:'info',icon:'📈',txt:`Rendement moyen de ${avgRate.toFixed(1)} %/an. Des FNB diversifiés ciblent historiquement 6–8 % sur le long terme.`});
      return s.slice(0,3);
    }

    // ── MICRO COMPONENTS ─────────────────────────────────────
    const Lbl = ({children}) => <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>{children}</div>;

    function KPI({label,value,sub,color}){
      return(
        <div style={{background:C.card,borderRadius:12,padding:'15px 18px',boxShadow:C.sh,flex:1,minWidth:130}}>
          <Lbl>{label}</Lbl>
          <div style={{fontSize:22,fontWeight:800,color:color||C.navy,lineHeight:1.1,marginBottom:4}}>{value}</div>
          {sub&&<div style={{fontSize:11,color:C.muted}}>{sub}</div>}
        </div>
      );
    }

    function Gauge({pct}){
      const color=pct>=80?C.green:pct>=65?C.amber:C.red;
      const lbl=pct>=80?'Excellent':pct>=70?'Bon':pct>=60?'À améliorer':'Risqué';
      const arc=Math.min(1,pct/100)*157;
      return(
        <div style={{textAlign:'center'}}>
          <svg width="130" height="76" viewBox="0 0 130 76">
            <path d="M14,66 A52,52,0,0,1,116,66" stroke={C.border} strokeWidth="11" fill="none" strokeLinecap="round"/>
            <path d="M14,66 A52,52,0,0,1,116,66" stroke={color} strokeWidth="11" fill="none" strokeLinecap="round" strokeDasharray={`${arc} 200`}/>
            <text x="65" y="64" textAnchor="middle" fontSize="22" fontWeight="800" fill={color}>{pct}%</text>
            <text x="65" y="76" textAnchor="middle" fontSize="11" fill={C.muted}>{lbl}</text>
          </svg>
        </div>
      );
    }

    function Tip({active,payload,label}){
      if(!active||!payload?.length)return null;
      const items=payload.filter(p=>!['b1','b2','b3','p10','base'].includes(p.dataKey)||p.dataKey==='base');
      const base=payload.find(p=>p.dataKey==='base');
      const p10r=payload.find(p=>p.dataKey==='p10');
      const p50r=payload.find(p=>p.dataKey==='p50');
      const p90r=payload.find(p=>p.dataKey==='p90')||(payload.find(p=>p.dataKey==='b3'));
      return(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'11px 15px',fontSize:12,boxShadow:C.sh,minWidth:160}}>
          <div style={{fontWeight:700,color:C.navy,marginBottom:7,fontSize:13,paddingBottom:5,borderBottom:`1px solid ${C.border}`}}>{label} ans</div>
          {base&&<div style={{display:'flex',justifyContent:'space-between',gap:14,marginBottom:3}}><span style={{color:C.muted}}>Base</span><b style={{color:C.blue}}>{fmtK(base.value)}</b></div>}
          {p10r&&<div style={{display:'flex',justifyContent:'space-between',gap:14,marginBottom:3}}><span style={{color:C.muted}}>P10</span><b style={{color:C.red}}>{fmtK(p10r.value)}</b></div>}
          {p50r&&<div style={{display:'flex',justifyContent:'space-between',gap:14,marginBottom:3}}><span style={{color:C.muted}}>Médiane</span><b style={{color:C.blue}}>{fmtK(p50r.value)}</b></div>}
        </div>
      );
    }

    function Input({label,value,onChange,type='number',min,max,step=1,suffix,prefix}){
      return(
        <div>
          {label&&<Lbl>{label}</Lbl>}
          <div style={{display:'flex',alignItems:'center',border:`2px solid ${C.border}`,borderRadius:8,overflow:'hidden',background:C.card}}>
            {prefix&&<span style={{padding:'0 8px',color:C.muted,fontSize:12,background:C.bg,borderRight:`1px solid ${C.border}`,alignSelf:'stretch',display:'flex',alignItems:'center'}}>{prefix}</span>}
            <input type={type} value={value} onChange={e=>onChange(type==='number'?+e.target.value:e.target.value)} min={min} max={max} step={step}
              style={{flex:1,padding:'8px 10px',border:'none',outline:'none',fontSize:13,fontWeight:700,color:C.navy,background:'transparent'}}/>
            {suffix&&<span style={{padding:'0 8px',color:C.muted,fontSize:12}}>{suffix}</span>}
          </div>
        </div>
      );
    }

    function Seg({options,value,onChange}){
      return(
        <div style={{display:'flex',background:C.bg,borderRadius:8,padding:3,gap:2}}>
          {options.map(o=>(
            <button key={o.value} onClick={()=>onChange(o.value)} style={{
              flex:1,padding:'6px 10px',border:'none',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600,
              background:value===o.value?C.card:'transparent',
              color:value===o.value?C.navy:C.muted,
              boxShadow:value===o.value?C.sh:'none',transition:'all .15s',
            }}>{o.label}</button>
          ))}
        </div>
      );
    }

    // ── ACCOUNT MODAL ────────────────────────────────────────
    function AccountModal({acct,onSave,onClose}){
      const [f,setF]=useState({...acct});
      const set=(k,v)=>setF(p=>({...p,[k]:v}));
      const addOT=()=>set('oneTime',[...(f.oneTime||[]),{id:uid(),age:35,amount:10000}]);
      const updOT=(i,k,v)=>{const a=[...(f.oneTime||[])];a[i]={...a[i],[k]:v};set('oneTime',a);};
      const delOT=i=>set('oneTime',(f.oneTime||[]).filter((_,j)=>j!==i));
      const def=ACCT_DEF[f.type]||ACCT_DEF.AUTRE;

      return(
        <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:20}}>
          <div style={{background:C.card,borderRadius:16,width:'100%',maxWidth:500,maxHeight:'92vh',overflow:'auto',boxShadow:'0 24px 64px rgba(0,0,0,.25)'}}>
            <div style={{height:5,background:def.color,borderRadius:'16px 16px 0 0'}}/>
            <div style={{padding:'16px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontWeight:700,fontSize:15,display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:20}}>{def.icon}</span>Configurer le placement</div>
              <button onClick={onClose} style={{border:'none',background:'none',fontSize:22,cursor:'pointer',color:C.muted,lineHeight:1}}>×</button>
            </div>
            <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <Input label="Nom" type="text" value={f.name} onChange={v=>set('name',v)}/>
                <div>
                  <Lbl>Type de compte</Lbl>
                  <select value={f.type} onChange={e=>set('type',e.target.value)} style={{width:'100%',padding:'9px 10px',border:`2px solid ${C.border}`,borderRadius:8,fontSize:13,fontWeight:600,color:C.navy}}>
                    {Object.entries(ACCT_DEF).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}
                  </select>
                </div>
              </div>
              <div style={{padding:'10px 12px',background:`${def.color}12`,borderRadius:8,fontSize:11,color:def.color,fontWeight:600}}>{def.tax}</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <Input label="Solde actuel ($)" value={f.balance} onChange={v=>set('balance',v)} min={0}/>
                <Input label="Rendement (%/an)" value={f.rate} onChange={v=>set('rate',v)} min={0} max={20} step={0.5} suffix="%"/>
              </div>

              <div>
                <Lbl>Niveau de risque (volatilité Monte Carlo)</Lbl>
                <div style={{display:'flex',gap:8}}>
                  {Object.entries(RISKS).map(([k,v])=>(
                    <button key={k} onClick={()=>set('risk',k)} style={{
                      flex:1,padding:'9px 6px',border:`2px solid ${f.risk===k?v.color:C.border}`,
                      borderRadius:8,background:f.risk===k?`${v.color}12`:'#fff',
                      color:f.risk===k?v.color:C.muted,fontWeight:700,fontSize:12,cursor:'pointer',
                      display:'flex',flexDirection:'column',alignItems:'center',gap:2,
                    }}>
                      <span>{v.label}</span><span style={{fontSize:10,fontWeight:400,opacity:.7}}>σ={Math.round(v.vol*100)}%/an</span>
                    </button>
                  ))}
                </div>
              </div>

              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12}}>
                <Lbl>Contributions récurrentes</Lbl>
                <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:8}}>
                  <div>
                    <div style={{fontSize:10,color:C.muted,marginBottom:2}}>Montant</div>
                    <input type="number" value={f.contribAmt} onChange={e=>set('contribAmt',+e.target.value)} style={{width:'100%',padding:'7px 8px',border:`2px solid ${C.border}`,borderRadius:8,fontSize:13,fontWeight:700}}/>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:C.muted,marginBottom:2}}>Fréq.</div>
                    <select value={f.contribFreq} onChange={e=>set('contribFreq',e.target.value)} style={{width:'100%',padding:'7px 6px',border:`2px solid ${C.border}`,borderRadius:8,fontSize:12}}>
                      <option value="annual">Annuel</option>
                      <option value="monthly">Mensuel</option>
                    </select>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:C.muted,marginBottom:2}}>De (âge)</div>
                    <input type="number" value={f.contribStart} onChange={e=>set('contribStart',+e.target.value)} style={{width:'100%',padding:'7px 8px',border:`2px solid ${C.border}`,borderRadius:8,fontSize:13,fontWeight:700}}/>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:C.muted,marginBottom:2}}>À (âge)</div>
                    <input type="number" value={f.contribEnd} onChange={e=>set('contribEnd',+e.target.value)} style={{width:'100%',padding:'7px 8px',border:`2px solid ${C.border}`,borderRadius:8,fontSize:13,fontWeight:700}}/>
                  </div>
                </div>
              </div>

              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <Lbl>Contributions ponctuelles</Lbl>
                  <button onClick={addOT} style={{padding:'4px 10px',border:`1px solid ${def.color}`,borderRadius:6,background:`${def.color}10`,color:def.color,cursor:'pointer',fontSize:11,fontWeight:700}}>+ Ajouter</button>
                </div>
                {(f.oneTime||[]).length===0&&<div style={{fontSize:11,color:C.muted,fontStyle:'italic',padding:'6px 0'}}>Ex: héritage à 40 ans, bonus, vente d'actif…</div>}
                {(f.oneTime||[]).map((ot,i)=>(
                  <div key={i} style={{display:'flex',gap:8,marginBottom:6,alignItems:'flex-end'}}>
                    <div style={{flex:'0 0 80px'}}>
                      <div style={{fontSize:10,color:C.muted,marginBottom:2}}>Âge</div>
                      <input type="number" value={ot.age} onChange={e=>updOT(i,'age',+e.target.value)} style={{width:'100%',padding:'6px 7px',border:`1px solid ${C.border}`,borderRadius:7,fontSize:13,fontWeight:700}}/>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,color:C.muted,marginBottom:2}}>Montant ($)</div>
                      <input type="number" value={ot.amount} onChange={e=>updOT(i,'amount',+e.target.value)} style={{width:'100%',padding:'6px 7px',border:`1px solid ${C.border}`,borderRadius:7,fontSize:13,fontWeight:700}}/>
                    </div>
                    <button onClick={()=>delOT(i)} style={{padding:'6px 9px',border:'none',background:'#FEF2F2',color:C.red,borderRadius:7,cursor:'pointer'}}>✕</button>
                  </div>
                ))}
              </div>
            </div>
            <div style={{padding:'14px 20px',borderTop:`1px solid ${C.border}`,display:'flex',justifyContent:'flex-end',gap:8}}>
              <button onClick={onClose} style={{padding:'8px 16px',border:`1px solid ${C.border}`,borderRadius:8,background:C.card,cursor:'pointer',fontWeight:600,color:C.muted}}>Annuler</button>
              <button onClick={()=>onSave(f)} style={{padding:'8px 20px',background:C.blue,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:13}}>Enregistrer</button>
            </div>
          </div>
        </div>
      );
    }

    // ── APP ─────────────────────────────────────────────────
    function App() {
      const [accounts,setAccounts]=useState(DEF_ACCOUNTS);
      const [withdrawals,setWithdrawals]=useState(DEF_WITHDRAWALS);
      const [params,setParams]=useState(DEF_PARAMS);
      const [tab,setTab]=useState('dashboard');
      const [mc,setMc]=useState(null);
      const [mcRunning,setMcRunning]=useState(false);
      const [editAcct,setEditAcct]=useState(null);

      const sim=useMemo(()=>runSim(accounts,withdrawals,params),[accounts,withdrawals,params]);

      useEffect(()=>{
        setMcRunning(true);
        const t=setTimeout(()=>{setMc(runMC(accounts,withdrawals,params));setMcRunning(false);},350);
        return()=>clearTimeout(t);
      },[accounts,withdrawals,params]);

      const suggestions=useMemo(()=>getSuggestions(sim,params,accounts,mc),[sim,params,accounts,mc]);
      const setP=(k,v)=>setParams(p=>({...p,[k]:v}));
      const last=sim[sim.length-1]||{totalBalance:0};
      const retIdx=sim.findIndex(r=>r.age>=(withdrawals[0]?.startAge||65));
      const retRow=sim[retIdx]||{};
      const monthNet=retRow.net?Math.round(retRow.net/12):0;

      // Chart: merge sim base + MC percentiles
      const chartData=useMemo(()=>{
        return sim.map((r,i)=>{
          const m=mc?.chartData?.[i]||{};
          return{age:r.age,base:r.totalBalance,p10:m.p10,b1:Math.max(0,(m.p25||0)-(m.p10||0)),b2:Math.max(0,(m.p75||0)-(m.p25||0)),b3:Math.max(0,(m.p90||0)-(m.p75||0)),p50:m.p50,p90:m.p90};
        });
      },[sim,mc]);

      const TABS=[
        {id:'dashboard',icon:'📊',label:'Tableau de bord'},
        {id:'accounts', icon:'💰',label:'Placements'},
        {id:'withdrawals',icon:'📉',label:'Retraits'},
        {id:'params',   icon:'⚙️',label:'Paramètres'},
        {id:'analysis', icon:'🧠',label:'Analyse MC'},
      ];

      const retAge=withdrawals[0]?.startAge||65;

      return(
        <div style={{height:'100vh',display:'flex',flexDirection:'column',background:C.bg,fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif',fontSize:14,color:C.navy,overflow:'hidden'}}>
          {/* ── HEADER ── */}
          <div style={{background:C.navy,padding:'0 20px',display:'flex',alignItems:'center',gap:8,height:50,flexShrink:0}}>
            <span style={{fontSize:17,fontWeight:800,color:'#fff',letterSpacing:-.5,marginRight:8}}>RetirePlan <span style={{color:C.teal,fontSize:12,fontWeight:600,letterSpacing:0}}>QC</span></span>
            <div style={{display:'flex',gap:2,flex:1}}>
              {TABS.map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{
                  padding:'5px 13px',borderRadius:6,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,
                  background:tab===t.id?'rgba(255,255,255,.14)':'transparent',
                  color:tab===t.id?'#fff':'rgba(255,255,255,.5)',transition:'all .15s',whiteSpace:'nowrap',
                }}>{t.icon} {t.label}</button>
              ))}
            </div>
            {mcRunning&&<span style={{fontSize:10,color:C.amber,animation:'pulse 1s infinite'}}>⟳ Monte Carlo…</span>}
            <span style={{fontSize:10,color:'rgba(255,255,255,.35)',marginLeft:8}}>{accounts.length} compte{accounts.length!==1?'s':''}</span>
          </div>

          <div style={{flex:1,overflow:'auto',padding:'18px 20px',display:'flex',flexDirection:'column',gap:16}}>

            {/* ── DASHBOARD ── */}
            {tab==='dashboard'&&(<>
              {/* KPIs */}
              <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                <KPI label="Solde final projeté" value={fmtK(last.totalBalance)} sub={`À ${params.ageTo} ans (scénario base)`} color={C.blue}/>
                <KPI label="Probabilité de succès" value={mc?`${mc.successRate}%`:'…'} sub={`N=${mc?.N||180} simulations Monte Carlo`} color={mc?.successRate>=80?C.green:mc?.successRate>=65?C.amber:C.red}/>
                <KPI label="Solde à la retraite" value={fmtK(retRow.totalBalance)} sub={`À ${retAge} ans — avant décaissement`} color={C.teal}/>
                <KPI label="Revenu net / mois" value={monthNet>0?fmtK(monthNet):'—'} sub="Retraits + RRQ + SV − impôts" color={C.purple}/>
              </div>

              {/* Main chart */}
              <div style={{background:C.card,borderRadius:14,boxShadow:C.sh,padding:'14px 6px 10px',flex:'0 0 auto'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'0 16px 10px'}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14}}>Évolution du portefeuille</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>Bandes Monte Carlo P10→P90 · Ligne: scénario de base</div>
                  </div>
                  <div style={{display:'flex',gap:10,fontSize:10,color:C.muted,flexWrap:'wrap',justifyContent:'flex-end'}}>
                    {[['Base',C.blue,false],[' P25–P75',C.blue+'66',true],[' P10–P90',C.blue+'33',true]].map(([l,c,box])=>(
                      <div key={l} style={{display:'flex',alignItems:'center',gap:3}}>
                        {box?<span style={{width:14,height:9,background:c,borderRadius:2,display:'inline-block'}}/>:<span style={{width:18,height:2.5,background:c,borderRadius:1,display:'inline-block'}}/>}
                        {l}
                      </div>
                    ))}
                  </div>
                </div>
                <ResponsiveContainer width="100%" height={255}>
                  <ComposedChart data={chartData} margin={{top:0,right:14,left:0,bottom:0}}>
                    <defs>
                      <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="5%" stopColor={C.blue} stopOpacity={.45}/>
                        <stop offset="95%" stopColor={C.blue} stopOpacity={.02}/>
                      </linearGradient>
                    </defs>
                    <CartesianGrid stroke="#F1F5F9" strokeDasharray="3 3"/>
                    <XAxis dataKey="age" stroke={C.muted} tick={{fontSize:10}} label={{value:'Âge',position:'insideBottomRight',offset:-8,fill:C.muted,fontSize:10}}/>
                    <YAxis tickFormatter={fmtK} stroke={C.muted} tick={{fontSize:9}} width={46}/>
                    <Tooltip content={<Tip/>}/>
                    <ReferenceLine x={retAge} stroke={C.teal} strokeDasharray="5 3" label={{value:'Retraite',fill:C.teal,fontSize:10,position:'insideTopLeft'}}/>
                    {mc&&<Area stackId="mc" type="monotone" dataKey="p10" stroke="none" fill="transparent" dot={false}/>}
                    {mc&&<Area stackId="mc" type="monotone" dataKey="b1"  stroke="none" fill={`${C.blue}20`} dot={false}/>}
                    {mc&&<Area stackId="mc" type="monotone" dataKey="b2"  stroke="none" fill={`${C.blue}35`} dot={false}/>}
                    {mc&&<Area stackId="mc" type="monotone" dataKey="b3"  stroke="none" fill={`${C.blue}20`} dot={false}/>}
                    {mc&&<Line type="monotone" dataKey="p50" stroke={`${C.blue}90`} strokeWidth={1.5} dot={false} strokeDasharray="5 3" name="Médiane"/>}
                    <Area type="monotone" dataKey="base" stroke={C.blue} strokeWidth={2.5} fill="url(#grad)" name="Base" dot={false}/>
                  </ComposedChart>
                </ResponsiveContainer>
              </div>

              {/* Suggestions */}
              {suggestions.length>0&&(
                <div style={{background:C.card,borderRadius:14,boxShadow:C.sh,padding:16}}>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>💡 Suggestions intelligentes</div>
                  <div style={{display:'flex',flexDirection:'column',gap:7}}>
                    {suggestions.map((s,i)=>(
                      <div key={i} style={{
                        padding:'10px 14px',borderRadius:9,fontSize:12,lineHeight:1.5,
                        background:s.lvl==='danger'?'#FEF2F2':s.lvl==='warning'?'#FFFBEB':'#EFF6FF',
                        borderLeft:`3px solid ${s.lvl==='danger'?C.red:s.lvl==='warning'?C.amber:C.blue}`,
                      }}><span style={{marginRight:6}}>{s.icon}</span>{s.txt}</div>
                    ))}
                  </div>
                </div>
              )}
            </>)}

            {/* ── PLACEMENTS ── */}
            {tab==='accounts'&&(<>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{fontWeight:700,fontSize:16}}>Mes placements <span style={{color:C.muted,fontSize:13,fontWeight:400}}>({accounts.length} compte{accounts.length!==1?'s':''})</span></div>
                <button onClick={()=>setEditAcct({id:uid(),name:'Nouveau',type:'CELI',balance:0,contribAmt:5000,contribFreq:'annual',contribStart:params.ageFrom,contribEnd:params.ageFrom+40,oneTime:[],rate:5,risk:'medium',_new:true})} style={{padding:'8px 16px',background:C.blue,color:'#fff',border:'none',borderRadius:9,cursor:'pointer',fontWeight:700,fontSize:13}}>+ Ajouter un placement</button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
                {accounts.map(a=>{
                  const def=ACCT_DEF[a.type]||ACCT_DEF.AUTRE;
                  const annualContrib=a.contribFreq==='monthly'?a.contribAmt*12:a.contribAmt;
                  const riskDef=RISKS[a.risk]||RISKS.medium;
                  return(
                    <div key={a.id} style={{background:C.card,borderRadius:13,boxShadow:C.sh,overflow:'hidden',transition:'box-shadow .2s'}}>
                      <div style={{height:4,background:`linear-gradient(90deg,${def.color},${def.color}88)`}}/>
                      <div style={{padding:15}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                          <div style={{display:'flex',alignItems:'center',gap:9}}>
                            <span style={{fontSize:26}}>{def.icon}</span>
                            <div>
                              <div style={{fontWeight:700,fontSize:14}}>{a.name}</div>
                              <div style={{fontSize:11,color:C.muted}}>{def.label}</div>
                            </div>
                          </div>
                          <div style={{display:'flex',gap:5}}>
                            <button onClick={()=>setEditAcct({...a})} style={{padding:'4px 9px',border:`1px solid ${C.border}`,borderRadius:7,background:C.card,cursor:'pointer',fontSize:12}}>✏️</button>
                            <button onClick={()=>setAccounts(p=>p.filter(x=>x.id!==a.id))} style={{padding:'4px 9px',border:'1px solid #FEE2E2',borderRadius:7,background:'#FEF2F2',cursor:'pointer',fontSize:12,color:C.red}}>✕</button>
                          </div>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:10}}>
                          {[
                            {l:'Solde actuel',   v:fmtK(a.balance,1)},
                            {l:'Contrib./an',    v:fmtK(annualContrib)},
                            {l:'Rendement',      v:`${a.rate}%/an`},
                            {l:'Risque',         v:riskDef.label},
                          ].map(({l,v})=>(
                            <div key={l} style={{background:C.bg,borderRadius:7,padding:'7px 10px'}}>
                              <div style={{fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:.4,fontWeight:700,marginBottom:2}}>{l}</div>
                              <div style={{fontWeight:700,fontSize:13,color:C.navy}}>{v}</div>
                            </div>
                          ))}
                        </div>
                        {a.oneTime?.length>0&&<div style={{fontSize:11,color:C.muted,marginBottom:8}}>🎯 {a.oneTime.length} contribution{a.oneTime.length>1?'s':''} ponctuelle{a.oneTime.length>1?'s':''}</div>}
                        <div style={{padding:'6px 10px',background:`${def.color}12`,borderRadius:7,fontSize:10,color:def.color,fontWeight:700}}>{def.tax}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
              {editAcct&&<AccountModal acct={editAcct} onSave={a=>{
                setAccounts(p=>a._new?[...p,{...a,_new:undefined}]:p.map(x=>x.id===a.id?a:x));
                setEditAcct(null);
              }} onClose={()=>setEditAcct(null)}/>}
            </>)}

            {/* ── RETRAITS ── */}
            {tab==='withdrawals'&&(
              <div style={{maxWidth:680,display:'flex',flexDirection:'column',gap:14}}>
                <div style={{fontWeight:700,fontSize:16}}>Stratégie de décaissement</div>

                <div style={{background:C.card,borderRadius:14,boxShadow:C.sh,padding:16}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>Priorité de retrait</div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    {Object.entries(STRATS).map(([k,v])=>(
                      <button key={k} onClick={()=>setP('strategy',k)} style={{
                        padding:'9px 18px',borderRadius:9,border:`2px solid ${params.strategy===k?C.blue:C.border}`,
                        background:params.strategy===k?`${C.blue}10`:C.card,
                        color:params.strategy===k?C.blue:C.muted,cursor:'pointer',fontWeight:700,fontSize:12,transition:'all .15s',
                      }}>{v.label}</button>
                    ))}
                  </div>
                  <div style={{marginTop:10,fontSize:11,color:C.muted,lineHeight:1.6,padding:'8px 12px',background:C.bg,borderRadius:8}}>
                    {params.strategy==='celi-first'&&'✅ Optimal fiscalement : le CÉLI est retiré en premier (libre d\'impôt), puis le compte non enregistré, puis le REER/FERR qui est imposable.'}
                    {params.strategy==='reer-first'&&'📋 Utile pour vider le REER avant conversion obligatoire en FERR à 71 ans.'}
                    {params.strategy==='balanced'&&'⚖️ Retraits proportionnels selon la valeur de chaque compte. Fiscalement sous-optimal mais simple.'}
                  </div>
                </div>

                <div style={{background:C.card,borderRadius:14,boxShadow:C.sh,padding:16}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                    <div style={{fontWeight:600,fontSize:13}}>Retraits planifiés</div>
                    <button onClick={()=>setWithdrawals(p=>[...p,{id:uid(),startAge:65,endAge:100,amount:30000,type:'fixed'}])} style={{padding:'5px 12px',border:`1px solid ${C.blue}`,borderRadius:7,background:`${C.blue}10`,color:C.blue,cursor:'pointer',fontSize:12,fontWeight:700}}>+ Ajouter</button>
                  </div>
                  {withdrawals.map((w,i)=>(
                    <div key={w.id} style={{border:`1px solid ${C.border}`,borderRadius:9,padding:12,marginBottom:8,display:'flex',flexWrap:'wrap',gap:10,alignItems:'flex-end',background:'#FAFBFC'}}>
                      {[
                        {lbl:'De (âge)',k:'startAge',w:70},
                        {lbl:'À (âge)', k:'endAge',  w:70},
                        {lbl:'Montant', k:'amount',  w:120},
                      ].map(f=>(
                        <div key={f.k}>
                          <Lbl>{f.lbl}</Lbl>
                          <input type="number" value={w[f.k]} onChange={e=>{const v=[...withdrawals];v[i]={...w,[f.k]:+e.target.value};setWithdrawals(v);}} style={{width:f.w,padding:'7px 9px',border:`2px solid ${C.border}`,borderRadius:8,fontSize:13,fontWeight:700,color:C.navy}}/>
                        </div>
                      ))}
                      <div>
                        <Lbl>Type</Lbl>
                        <select value={w.type} onChange={e=>{const v=[...withdrawals];v[i]={...w,type:e.target.value};setWithdrawals(v);}} style={{padding:'7px 9px',border:`2px solid ${C.border}`,borderRadius:8,fontSize:12,fontWeight:600}}>
                          <option value="fixed">Fixe $</option>
                          <option value="percent">% du portef.</option>
                        </select>
                      </div>
                      <button onClick={()=>setWithdrawals(p=>p.filter(x=>x.id!==w.id))} style={{padding:'7px 11px',background:'#FEF2F2',border:'1px solid #FEE2E2',borderRadius:8,color:C.red,cursor:'pointer',fontSize:14}}>✕</button>
                    </div>
                  ))}
                </div>

                <div style={{background:C.card,borderRadius:14,boxShadow:C.sh,padding:16}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>Prestations gouvernementales (RRQ / SV / SRG)</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                    {[{l:'Âge RRQ',k:'ageRRQ',note:'60–72 ans'},{l:'Âge SV',k:'ageSV',note:'65–70 ans'},{l:'Salaire moyen',k:'salary',note:'Pour calcul RRQ'}].map(f=>(
                      <div key={f.k}>
                        <Lbl>{f.l}</Lbl>
                        <input type="number" value={params[f.k]} onChange={e=>setP(f.k,+e.target.value)} style={{width:'100%',padding:'9px 10px',border:`2px solid ${C.border}`,borderRadius:9,fontSize:14,fontWeight:700,color:C.teal}}/>
                        <div style={{fontSize:10,color:C.muted,marginTop:3}}>{f.note}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ── PARAMS ── */}
            {tab==='params'&&(
              <div style={{maxWidth:580,display:'flex',flexDirection:'column',gap:14}}>
                <div style={{fontWeight:700,fontSize:16}}>Paramètres de simulation</div>
                <div style={{background:C.card,borderRadius:14,boxShadow:C.sh,padding:20,display:'flex',flexDirection:'column',gap:16}}>
                  <div>
                    <Lbl>Horizon de simulation · {params.ageFrom} à {params.ageTo} ans</Lbl>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                      {[{l:'De',k:'ageFrom',min:18,max:64},{l:'À',k:'ageTo',min:65,max:110}].map(f=>(
                        <div key={f.k}>
                          <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{f.l}</div>
                          <input type="range" min={f.min} max={f.max} value={params[f.k]} onChange={e=>setP(f.k,+e.target.value)} style={{width:'100%',accentColor:C.blue}}/>
                          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.muted}}><span>{f.min}</span><span style={{fontWeight:700,color:C.navy}}>{params[f.k]} ans</span><span>{f.max}</span></div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div>
                    <Lbl>Inflation annuelle · {params.inflation.toFixed(1)} %</Lbl>
                    <input type="range" min={0} max={6} step={0.1} value={params.inflation} onChange={e=>setP('inflation',+e.target.value)} style={{width:'100%',accentColor:C.amber}}/>
                    <div style={{fontSize:11,color:C.muted,marginTop:3}}>Cible Banque du Canada : 2 % — Note: les calculs sont en nominal. L'inflation érode le pouvoir d'achat réel.</div>
                  </div>
                  <Input label="Salaire moyen (pour RRQ)" value={params.salary} onChange={v=>setP('salary',v)} prefix="$" min={0}/>
                  <div style={{padding:'10px 14px',background:'#EFF6FF',borderRadius:9,fontSize:12,color:C.blue,lineHeight:1.6}}>
                    <b>Monte Carlo</b> — {mc?.N||180} simulations sont lancées avec des rendements variables (basés sur le niveau de risque de chaque compte). Les bandes P10–P90 représentent la fourchette réaliste des résultats.
                  </div>
                </div>
              </div>
            )}

            {/* ── ANALYSE MC ── */}
            {tab==='analysis'&&(<>
              <div style={{fontWeight:700,fontSize:16}}>Analyse Monte Carlo</div>
              <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
                <div style={{background:C.card,borderRadius:14,boxShadow:C.sh,padding:20,flex:'0 0 220px'}}>
                  <Lbl>Probabilité de succès</Lbl>
                  <Gauge pct={mc?.successRate??0}/>
                  <div style={{fontSize:11,color:C.muted,textAlign:'center',marginTop:6,lineHeight:1.5}}>Le portefeuille dure jusqu'à {params.ageTo} ans dans {mc?.successRate??'…'} % des simulations</div>
                </div>
                <div style={{background:C.card,borderRadius:14,boxShadow:C.sh,padding:20,flex:1,minWidth:220}}>
                  <Lbl>Valeur du portefeuille à {params.ageTo} ans</Lbl>
                  {[
                    {l:'P10 — Pessimiste',  k:'p10',c:C.red},
                    {l:'P50 — Médiane',     k:'p50',c:C.blue},
                    {l:'P90 — Optimiste',   k:'p90',c:C.green},
                    {l:'Base (fixe)',        k:'base',c:C.navy},
                  ].map(s=>{
                    const val=s.k==='base'?last.totalBalance:mc?.chartData?.[mc.chartData.length-1]?.[s.k];
                    return(
                      <div key={s.k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
                        <span style={{fontSize:12,color:s.c,fontWeight:600}}>{s.l}</span>
                        <span style={{fontWeight:800,fontSize:15,color:s.c}}>{val!=null?fmtK(val):'…'}</span>
                      </div>
                    );

                </div>
              </div>

              <div style={{background:C.card,borderRadius:14,boxShadow:C.sh,padding:'14px 6px 8px'}}>
                <div style={{padding:'0 16px 10px',fontWeight:700,fontSize:13}}>Éventail Monte Carlo — {params.ageFrom} à {params.ageTo} ans</div>
                <ResponsiveContainer width="100%" height={310}>
                  <ComposedChart data={chartData} margin={{top:0,right:14,left:0,bottom:0}}>
                    <CartesianGrid stroke="#F1F5F9" strokeDasharray="3 3"/>
                    <XAxis dataKey="age" stroke={C.muted} tick={{fontSize:10}}/>
                    <YAxis tickFormatter={fmtK} stroke={C.muted} tick={{fontSize:9}} width={46}/>
                    <Tooltip content={<Tip/>}/>
                    <ReferenceLine x={retAge} stroke={C.teal} strokeDasharray="5 3" label={{value:'Retraite',fill:C.teal,fontSize:10}}/>
                    {mc&&<Area stackId="mc" type="monotone" dataKey="p10" stroke={`${C.red}80`} strokeWidth={1.5} strokeDasharray="4 3" fill="transparent" dot={false} name="P10 (pessimiste)"/>}
                    {mc&&<Area stackId="mc" type="monotone" dataKey="b1"  stroke="none" fill={`${C.blue}18`} dot={false}/>}
                    {mc&&<Area stackId="mc" type="monotone" dataKey="b2"  stroke="none" fill={`${C.blue}30`} dot={false}/>}
                    {mc&&<Area stackId="mc" type="monotone" dataKey="b3"  stroke="none" fill={`${C.blue}18`} dot={false}/>}
                    {mc&&<Line type="monotone" dataKey="p50" stroke={C.blue} strokeWidth={1.5} dot={false} strokeDasharray="6 3" name="Médiane (P50)"/>}
                    <Line type="monotone" dataKey="base" stroke={C.navy} strokeWidth={2.5} dot={false} name="Scénario base"/>
                  </ComposedChart>
                </ResponsiveContainer>
                <div style={{display:'flex',gap:16,padding:'6px 18px 2px',fontSize:10,color:C.muted,flexWrap:'wrap'}}>
                  {[['Scénario base',C.navy,false],['Médiane P50',C.blue,true],['Zone P25–P75',C.blue+'55',true,true],['P10 (pessimiste)',C.red,true]].map(([l,c,d,box])=>(
                    <div key={l} style={{display:'flex',alignItems:'center',gap:4}}>
                      {box?<span style={{width:16,height:9,background:c,borderRadius:2,display:'inline-block'}}/>:<span style={{width:20,height:2.5,background:c,borderRadius:1,display:'inline-block',opacity:d?.5:1}}/>}
                      {l}
                    </div>
                  ))}
                </div>
              </div>
            </>)}
          </div>
        </div>
      );
    }

    // Initialisation de l'application React 18
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
