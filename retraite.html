<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Calculateur Retraite</title>
    <style>
    body { font-family: sans-serif; margin: 0; padding: 0; background: white; height: 100vh; overflow: hidden; }
    .container { display: flex; flex-direction: column; height: 100vh; }
    header { border-bottom: 1px solid #e5e7eb; padding: 20px 30px; }
    header h1 { margin: 0; font-size: 26px; }
    header p { margin: 5px 0 0 0; font-size: 12px; color: #666; }
    main { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 350px; background: #f9fafb; border-right: 1px solid #e5e7eb; overflow-y: auto; padding: 20px; }
    .section { margin-bottom: 20px; }
    .section h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; margin: 0 0 12px 0; }
    .box { background: white; border: 1px solid #e5e7eb; padding: 12px; border-radius: 4px; }
    .group { margin-bottom: 12px; }
    .group label { display: block; font-size: 12px; margin-bottom: 6px; }
    input, select { font-family: inherit; }
    input[type="range"] { width: 100%; }
    input[type="number"], select { width: 100%; padding: 6px; border: 1px solid #d1d5db; border-radius: 3px; font-size: 12px; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    .row input:first-child { width: 50px; }
    .row input:nth-child(2) { flex: 1; }
    .row select { flex: 0 0 80px; }
    .row button { padding: 6px 8px; background: #fecaca; color: #991b1b; border: none; cursor: pointer; font-size: 12px; border-radius: 3px; }
    .info { font-size: 10px; color: #666; margin-top: 4px; }
    .summary { background: white; border: 1px solid #e5e7eb; padding: 12px; border-radius: 4px; }
    .sum { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
    .sum.final { border-top: 1px solid #e5e7eb; padding-top: 6px; margin-top: 6px; font-weight: 600; }
    .btn { padding: 6px 12px; background: #1f2937; color: white; border: none; cursor: pointer; font-size: 12px; border-radius: 3px; }
    .content { flex: 1; overflow-y: auto; padding: 20px; }
    .cbox { background: white; border: 1px solid #e5e7eb; padding: 12px; border-radius: 4px; margin-bottom: 20px; }
    .cbox h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; margin: 0 0 12px 0; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; }
    .cgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    canvas { width: 100%; height: 180px; display: block; }
    table { width: 100%; font-size: 11px; border-collapse: collapse; background: white; border: 1px solid #e5e7eb; }
    table th { background: #f3f4f6; padding: 8px; text-align: left; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
    table td { padding: 8px; border-bottom: 1px solid #f3f4f6; text-align: right; }
    table td:first-child { text-align: left; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Calculateur Retraite</h1>
        <p>Quebec et Canada</p>
    </header>
    <main>
        <div class="sidebar">
            <div class="section">
                <h2>Parametres</h2>
                <div class="box">
                    <div class="group">
                        <label>Solde initial: <span id="d1">50000</span></label>
                        <input type="range" id="initBal" min="0" max="500000" step="10000" value="50000">
                    </div>
                    <div class="group">
                        <label>Age debut: <span id="d2">25</span></label>
                        <input type="range" id="startAge" min="18" max="65" value="25">
                    </div>
                    <div class="group">
                        <label>Age fin: <span id="d3">95</span></label>
                        <input type="range" id="endAge" min="50" max="105" value="95">
                    </div>
                    <div class="group">
                        <label>Rendement: <span id="d4">5.0%</span></label>
                        <input type="range" id="returnRate" min="0" max="0.10" step="0.01" value="0.05">
                    </div>
                    <div class="group">
                        <label>Salaire moyen</label>
                        <input type="number" id="avgSalary" value="80000">
                    </div>
                </div>
            </div>
            <div class="section">
                <h2>Contributions</h2>
                <div id="contribList"></div>
                <button class="btn" onclick="addContrib()">+ Ajouter</button>
            </div>
            <div class="section">
                <h2>Retraits</h2>
                <div id="withdrawList"></div>
                <button class="btn" onclick="addWithdraw()">+ Ajouter</button>
            </div>
            <div class="section">
                <h2>Resume</h2>
                <div class="summary">
                    <div class="sum"><span>Contributions</span><span id="s1">0</span></div>
                    <div class="sum"><span>Retraits</span><span id="s2">0</span></div>
                    <div class="sum"><span>Impots</span><span id="s3">0</span></div>
                    <div class="sum"><span>Prestations</span><span id="s4">0</span></div>
                    <div class="sum final"><span>Solde final</span><span id="s5">0</span></div>
                </div>
            </div>
        </div>
        <div class="content">
            <div class="cbox" style="height: 280px;">
                <h2>Portefeuille</h2>
                <canvas id="chart1"></canvas>
            </div>
            <div class="cgrid">
                <div class="cbox"><h2>RRQ</h2><canvas id="chart2"></canvas></div>
                <div class="cbox"><h2>SV + SRG</h2><canvas id="chart3"></canvas></div>
                <div class="cbox"><h2>Impots</h2><canvas id="chart4"></canvas></div>
            </div>
            <div class="cbox">
                <h2>Details</h2>
                <table><thead><tr><th>Age</th><th>Portef</th><th>RRQ</th><th>SV</th><th>SRG</th><th>Impot</th><th>Net</th></tr></thead><tbody id="tbody"></tbody></table>
            </div>
        </div>
    </main>
</div>

<script>
var contrib = [{id: 1, age: 30, amount: 10000, vehicle: 'REER'}];
var withdraw = [{id: 1, age: 65, amount: 40000}];
var nextC = 2;
var nextW = 2;

function calcSV(age, income) {
    if (age < 65) return 0;
    return Math.max(0, 8000 - Math.max(0, income - 90997) * 0.15);
}

function calcSRG(age, income, sv) {
    if (age < 60) return 0;
    return Math.max(0, 12000 - Math.max(0, income - sv) * 0.5);
}

function calcRRQ(age, years, salary) {
    if (age < 60) return 0;
    var b = Math.min(salary * 0.25, 15888);
    if (age < 65) b = b * (1 - 0.054 * (65 - age));
    else if (age > 65) b = b * (1 + 0.042 * Math.min(age - 65, 7));
    return b;
}

function calcTax(income) {
    if (income <= 0) return 0;
    var fed = [55867, 111733, 173205];
    var fedRate = [0.15, 0.205, 0.26, 0.33];
    var qc = [49275, 98540, 119910];
    var qcRate = [0.15, 0.20, 0.2575, 0.2975];
    
    var t = 0;
    var p = 0;
    var i = 0;
    
    for (i = 0; i < 4; i++) {
        var limit = i < fed.length ? fed[i] : income + 1;
        var taxable = Math.min(income, limit) - p;
        t += Math.max(0, taxable) * fedRate[i];
        p = limit;
        if (income <= limit) break;
    }
    
    p = 0;
    for (i = 0; i < 4; i++) {
        var limit = i < qc.length ? qc[i] : income + 1;
        var taxable = Math.min(income, limit) - p;
        t += Math.max(0, taxable) * qcRate[i];
        p = limit;
        if (income <= limit) break;
    }
    
    return Math.max(0, t - (0.15 + 0.15) * 15705);
}

function simulate() {
    var s = parseInt(document.getElementById('startAge').value);
    var e = parseInt(document.getElementById('endAge').value);
    var b = parseInt(document.getElementById('initBal').value);
    var r = parseFloat(document.getElementById('returnRate').value);
    var sal = parseInt(document.getElementById('avgSalary').value);
    
    var res = [];
    var bal = b;
    var yc = 0;
    var age = s;
    
    for (age = s; age <= e; age++) {
        var c = 0;
        var j = 0;
        for (j = 0; j < contrib.length; j++) {
            if (contrib[j].age === age) c += contrib[j].amount;
        }
        
        var w = 0;
        for (j = 0; j < withdraw.length; j++) {
            if (withdraw[j].age === age) w += withdraw[j].amount;
        }
        
        bal = bal * (1 + r) + c - w;
        if (c > 0) yc++;
        
        var t = 0;
        for (j = 0; j < withdraw.length; j++) {
            if (withdraw[j].age === age) t = calcTax(w);
        }
        
        var rrq = calcRRQ(age, yc, sal);
        var sv = calcSV(age, w);
        var srg = calcSRG(age, w, sv);
        var ben = rrq + sv + srg;
        var net = (w + ben) - t;
        
        res.push({age: age, bal: Math.max(0, bal), c: c, w: w, t: t, rrq: rrq, sv: sv, srg: srg, ben: ben, net: net});
    }
    
    return res;
}

function drawLine(canvasId, data, color) {
    var canvas = document.getElementById(canvasId);
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    var W = canvas.width, H = canvas.height;
    var pad = 30;
    
    if (!data || data.length === 0) return;
    
    var max = Math.max.apply(null, data.map(function(d) { return d.v; }));
    if (max === 0) max = 1;
    
    ctx.clearRect(0, 0, W, H);
    ctx.strokeStyle = color || '#1f2937';
    ctx.lineWidth = 2;
    ctx.beginPath();
    
    for (var i = 0; i < data.length; i++) {
        var x = pad + (i / (data.length - 1)) * (W - pad * 2);
        var y = H - pad - (data[i].v / max) * (H - pad * 2);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    
    // Fill
    ctx.lineTo(pad + (W - pad * 2), H - pad);
    ctx.lineTo(pad, H - pad);
    ctx.closePath();
    ctx.fillStyle = (color || '#1f2937') + '22';
    ctx.fill();
    
    // Labels
    ctx.fillStyle = '#666';
    ctx.font = '10px sans-serif';
    ctx.fillText(data[0].label, pad, H - 5);
    ctx.fillText(data[data.length-1].label, W - pad - 10, H - 5);
    ctx.fillText((max/1000).toFixed(0)+'k', 2, pad + 5);
}

function update() {
    var v = parseInt(document.getElementById('initBal').value);
    document.getElementById('d1').textContent = v.toLocaleString('fr-CA');
    document.getElementById('d2').textContent = document.getElementById('startAge').value;
    document.getElementById('d3').textContent = document.getElementById('endAge').value;
    var r = parseFloat(document.getElementById('returnRate').value) * 100;
    document.getElementById('d4').textContent = r.toFixed(1) + '%';
    
    var html = '';
    var i = 0;
    for (i = 0; i < contrib.length; i++) {
        html += '<div class="box" style="margin-bottom: 8px;"><div class="row">';
        html += '<input type="number" value="' + contrib[i].age + '" onchange="contrib[' + i + '].age=parseInt(this.value);update()">';
        html += '<input type="number" value="' + contrib[i].amount + '" onchange="contrib[' + i + '].amount=parseInt(this.value);update()">';
        html += '<select onchange="contrib[' + i + '].vehicle=this.value;update()">';
        html += '<option' + (contrib[i].vehicle === 'REER' ? ' selected' : '') + '>REER</option>';
        html += '<option' + (contrib[i].vehicle === 'CELI' ? ' selected' : '') + '>CELI</option>';
        html += '<option' + (contrib[i].vehicle === 'Non-enreg' ? ' selected' : '') + '>Non-enreg</option>';
        html += '</select>';
        html += '<button onclick="contrib.splice(' + i + ',1);update()">X</button>';
        html += '</div><div class="info">Age ' + contrib[i].age + ' - ' + contrib[i].amount.toLocaleString('fr-CA') + '</div></div>';
    }
    document.getElementById('contribList').innerHTML = html;
    
    html = '';
    for (i = 0; i < withdraw.length; i++) {
        html += '<div class="box" style="margin-bottom: 8px;"><div class="row">';
        html += '<input type="number" value="' + withdraw[i].age + '" onchange="withdraw[' + i + '].age=parseInt(this.value);update()">';
        html += '<input type="number" value="' + withdraw[i].amount + '" onchange="withdraw[' + i + '].amount=parseInt(this.value);update()">';
        html += '<button onclick="withdraw.splice(' + i + ',1);update()">X</button>';
        html += '</div><div class="info">Age ' + withdraw[i].age + ' - ' + withdraw[i].amount.toLocaleString('fr-CA') + '</div></div>';
    }
    document.getElementById('withdrawList').innerHTML = html;
    
    var res = simulate();
    var tc = 0, tw = 0, tt = 0, tb = 0;
    for (i = 0; i < res.length; i++) {
        tc += res[i].c;
        tw += res[i].w;
        tt += res[i].t;
        tb += res[i].ben;
    }
    var fb = res[res.length - 1].bal;
    
    document.getElementById('s1').textContent = tc.toLocaleString('fr-CA');
    document.getElementById('s2').textContent = tw.toLocaleString('fr-CA');
    document.getElementById('s3').textContent = tt.toLocaleString('fr-CA');
    document.getElementById('s4').textContent = tb.toLocaleString('fr-CA');
    document.getElementById('s5').textContent = fb.toLocaleString('fr-CA');
    
    // Draw charts
    drawLine('chart1', res.map(function(d) { return {v: d.bal, label: d.age}; }), '#1f2937');
    drawLine('chart2', res.map(function(d) { return {v: d.rrq, label: d.age}; }), '#2563eb');
    drawLine('chart3', res.map(function(d) { return {v: d.sv + d.srg, label: d.age}; }), '#16a34a');
    drawLine('chart4', res.map(function(d) { return {v: d.t, label: d.age}; }), '#dc2626');
    
    html = '';
    for (i = 0; i < res.length; i += 3) {
        var x = res[i];
        html += '<tr><td>' + x.age + '</td>';
        html += '<td>' + (x.bal/1000).toFixed(0) + 'k</td>';
        html += '<td>' + x.rrq.toLocaleString('fr-CA',{maximumFractionDigits:0}) + '</td>';
        html += '<td>' + x.sv.toLocaleString('fr-CA',{maximumFractionDigits:0}) + '</td>';
        html += '<td>' + x.srg.toLocaleString('fr-CA',{maximumFractionDigits:0}) + '</td>';
        html += '<td>' + x.t.toLocaleString('fr-CA',{maximumFractionDigits:0}) + '</td>';
        html += '<td>' + x.net.toLocaleString('fr-CA',{maximumFractionDigits:0}) + '</td></tr>';
    }
    document.getElementById('tbody').innerHTML = html;
}

function addContrib() {
    contrib.push({id: nextC, age: 40, amount: 5000, vehicle: 'REER'});
    nextC++;
    update();
}

function addWithdraw() {
    withdraw.push({id: nextW, age: 70, amount: 30000});
    nextW++;
    update();
}

['initBal','startAge','endAge','returnRate','avgSalary'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', update);
});

window.addEventListener('resize', update);
update();
</script>
</body>
</html>
