<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RetirePlan QC</title>
<style>
/* ── Reset ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
     font-size:14px;color:#0F172A;background:#F1F5F9}
input,select,button{font-family:inherit}
button{cursor:pointer}
input[type=range]{width:100%;cursor:pointer;accent-color:#2563EB}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}

/* ── Layout ────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh}
.topbar{background:#0F172A;height:50px;display:flex;align-items:center;
        padding:0 20px;gap:3px;flex-shrink:0;overflow-x:auto}
.main{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:14px}

/* ── Nav ───────────────────────────────────── */
.logo{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-right:12px;white-space:nowrap}
.logo b{color:#0D9488;font-size:12px;font-weight:600;letter-spacing:0}
.tab-btn{padding:5px 12px;border:none;border-radius:6px;font-size:12px;font-weight:600;
         background:transparent;color:rgba(255,255,255,.45);white-space:nowrap}
.tab-btn.on{background:rgba(255,255,255,.14);color:#fff}
.topbar-tag{margin-left:auto;font-size:10px;color:rgba(255,255,255,.35);white-space:nowrap;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:10px;height:10px;border:2px solid rgba(255,255,255,.25);
      border-top-color:#F59E0B;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}

/* ── Cards ─────────────────────────────────── */
.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04)}
.card-pad{padding:18px}
.card-head{padding:11px 16px;border-bottom:1px solid #F1F5F9;font-size:13px;font-weight:700;
           display:flex;justify-content:space-between;align-items:center}
hr.div{border:none;border-top:1px solid #F1F5F9;margin:6px 0}

/* ── KPI ───────────────────────────────────── */
.kpi-row{display:flex;gap:10px;flex-wrap:wrap}
.kpi{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);
     flex:1 1 130px;padding:13px 15px}
.kpi-lbl{font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-val{font-size:21px;font-weight:800;line-height:1.1;margin-bottom:3px}
.kpi-sub{font-size:10px;color:#64748B}

/* ── Forms ─────────────────────────────────── */
.field-lbl{font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.4px}
.field-hint{font-size:10px;color:#94A3B8;margin-top:2px}
.inp{width:100%;padding:8px 10px;border:2px solid #E2E8F0;border-radius:8px;font-size:13px;
     font-weight:700;color:#0F172A;outline:none;background:#fff;transition:border-color .15s}
.inp:focus{border-color:#2563EB}
.sel{width:100%;padding:8px 10px;border:2px solid #E2E8F0;border-radius:8px;font-size:13px;
     font-weight:600;color:#0F172A;background:#fff;outline:none}
.irow{display:flex;align-items:stretch;border:2px solid #E2E8F0;border-radius:8px;overflow:hidden;background:#fff}
.irow:focus-within{border-color:#2563EB}
.irow .pfx{padding:0 9px;background:#F8FAFC;border-right:1px solid #E2E8F0;
           font-size:12px;color:#64748B;display:flex;align-items:center;flex-shrink:0}
.irow .sfx{padding:0 9px;font-size:12px;color:#64748B;display:flex;align-items:center;flex-shrink:0}
.irow input{flex:1;padding:8px 10px;border:none;outline:none;font-size:13px;font-weight:700;
            color:#0F172A;background:transparent;min-width:0}
.rl{display:flex;justify-content:space-between;font-size:10px;color:#94A3B8;margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}

/* ── Buttons ───────────────────────────────── */
.btn{padding:8px 16px;border-radius:9px;border:none;font-size:13px;font-weight:700}
.btn:hover{opacity:.88}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:7px}
.btn-primary{background:#2563EB;color:#fff}
.btn-ghost{background:transparent;border:2px solid #E2E8F0;color:#64748B}
.btn-danger{background:#FEF2F2;color:#EF4444;border:1px solid #FEE2E2}
.btn-icon{padding:5px 8px;font-size:13px;border-radius:7px;border:1px solid #E2E8F0;background:#fff}

/* ── Segment ───────────────────────────────── */
.seg{display:flex;background:#F1F5F9;border-radius:9px;padding:3px;gap:2px}
.seg-btn{flex:1;padding:7px 10px;border:none;border-radius:7px;font-size:12px;font-weight:600;
         background:transparent;color:#64748B;transition:all .15s}
.seg-btn.on{background:#fff;color:#0F172A;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* ── Risk ──────────────────────────────────── */
.risk-btns{display:flex;gap:8px}
.risk-btn{flex:1;padding:10px 6px;border-radius:9px;border:2px solid #E2E8F0;background:#fff;
          font-size:12px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px}
.risk-btn small{font-size:10px;font-weight:400;opacity:.7}

/* ── Account cards ─────────────────────────── */
.acct-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px}
.acct-card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);overflow:hidden}
.acct-stripe{height:4px}
.acct-body{padding:13px}
.acct-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px}
.acct-ttl{display:flex;align-items:center;gap:8px}
.acct-actions{display:flex;gap:5px}
.acct-stats{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:9px}
.acct-stat{background:#F8FAFC;border-radius:8px;padding:6px 9px}
.stat-lbl{font-size:9px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.stat-val{font-size:13px;font-weight:700}
.acct-badge{padding:5px 9px;border-radius:7px;font-size:10px;font-weight:700;display:inline-block}

/* ── Withdrawal row ────────────────────────── */
.w-row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;padding:11px;
       border:1px solid #E2E8F0;border-radius:10px;margin-bottom:7px;background:#FAFBFC}

/* ── Alerts ────────────────────────────────── */
.alert{padding:10px 13px;border-radius:9px;font-size:12px;line-height:1.6;
       display:flex;gap:8px;align-items:flex-start;margin-bottom:7px}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.al-info{background:#EFF6FF;border-left:3px solid #2563EB}
.al-warn{background:#FFFBEB;border-left:3px solid #F59E0B}
.al-danger{background:#FEF2F2;border-left:3px solid #EF4444}

/* ── Info boxes ────────────────────────────── */
.info-box{padding:10px 13px;border-radius:9px;font-size:11px;line-height:1.65}
.info-blue{background:#EFF6FF;color:#2563EB}
.info-muted{background:#F8FAFC;color:#64748B}

/* ── Legend ────────────────────────────────── */
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:7px 16px 11px;font-size:11px;color:#64748B}
.li{display:flex;align-items:center;gap:5px}
.ll{width:20px;height:2.5px;border-radius:2px;flex-shrink:0;display:inline-block}
.la{width:13px;height:9px;border-radius:3px;flex-shrink:0;display:inline-block}

/* ── Canvas ────────────────────────────────── */
canvas{display:block;width:100%}

/* ── Modal ─────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.65);z-index:999;
         display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:520px;
       max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.25)}
.modal-head{padding:13px 18px;display:flex;justify-content:space-between;align-items:center;
            border-bottom:1px solid #F1F5F9;font-size:15px;font-weight:700}
.modal-body{padding:18px;display:flex;flex-direction:column;gap:13px}
.modal-foot{padding:13px 18px;border-top:1px solid #F1F5F9;display:flex;justify-content:flex-end;gap:8px}
.modal-x{border:none;background:none;font-size:22px;color:#94A3B8;line-height:1}

/* ── One-time row ──────────────────────────── */
.ot-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:7px}

/* ── Sec title ─────────────────────────────── */
.sec-title{font-size:15px;font-weight:700}
.sec-row{display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div class="app">
  <nav class="topbar" id="topbar"></nav>
  <main class="main" id="main"></main>
</div>
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
'use strict';

/* ── CONFIG ──────────────────────────────────────────── */
const ACCT = {
  REER:   {label:'REER',           icon:'🏦', color:'#2563EB', tax:"Déductible à la contribution · Imposable au retrait"},
  CELI:   {label:'CÉLI',           icon:'🌱', color:'#10B981', tax:"Cotisations après impôt · Retraits libres d'impôt"},
  NONREG: {label:'Non enregistré', icon:'📈', color:'#F59E0B', tax:"50 % des gains en capital imposables"},
  IMMO:   {label:'Immobilier',     icon:'🏠', color:'#7C3AED', tax:"Valeur nette estimée de la propriété"},
  AUTRE:  {label:'Autre actif',    icon:'💼', color:'#64748B', tax:"Actif personnalisé"},
};
const RISK = {
  low:    {label:'Faible',  vol:.05, color:'#10B981'},
  medium: {label:'Modéré',  vol:.12, color:'#F59E0B'},
  high:   {label:'Élevé',   vol:.20, color:'#EF4444'},
};
const STRAT = {
  'celi-first': {label:'CÉLI d\'abord', order:['CELI','NONREG','REER','IMMO','AUTRE'],
    desc:"✅ Optimal fiscalement : CÉLI (libre d'impôt) → Non enregistré → REER (imposable au retrait)."},
  'reer-first': {label:'REER d\'abord', order:['REER','NONREG','CELI','IMMO','AUTRE'],
    desc:"📋 Vider le REER/FERR en premier, utile avant la conversion obligatoire à 71 ans."},
  'balanced':   {label:'Proportionnel', order:null,
    desc:"⚖️ Retraits proportionnels selon la valeur de chaque compte. Simple mais sous-optimal fiscalement."},
};
const TABS = [
  {id:'dashboard',   icon:'📊', label:'Tableau de bord'},
  {id:'accounts',    icon:'💰', label:'Placements'},
  {id:'withdrawals', icon:'📉', label:'Retraits'},
  {id:'params',      icon:'⚙️', label:'Paramètres'},
  {id:'monte',       icon:'🧠', label:'Monte Carlo'},
];

/* ── STATE ───────────────────────────────────────────── */
let _uid = 0;
const uid = () => 'u' + (++_uid);

const S = {
  tab: 'dashboard',
  accounts: [
    {id:uid(),name:'REER',type:'REER',balance:50000,contribAmt:10000,contribFreq:'annual',contribStart:25,contribEnd:65,oneTime:[],rate:6,risk:'medium'},
    {id:uid(),name:'CÉLI',type:'CELI',balance:20000,contribAmt:6000, contribFreq:'annual',contribStart:25,contribEnd:65,oneTime:[],rate:5,risk:'low'},
  ],
  withdrawals: [{id:uid(),startAge:65,endAge:100,amount:45000,type:'fixed'}],
  params: {ageFrom:25,ageTo:95,salary:80000,ageRRQ:65,ageSV:65,ageSRG:60,strategy:'celi-first'},
  sim: [],
  mc: null,
  mcRunning: false,
  modalAcct: null,
};

/* ── HELPERS ─────────────────────────────────────────── */
const fmtK = v => {
  if (!isFinite(v) || isNaN(v)) return '—';
  const a = Math.abs(v);
  if (a >= 1e6) return (v/1e6).toFixed(1) + 'M$';
  if (a >= 1e3) return (v/1e3).toFixed(0) + 'k$';
  return Math.round(v) + '$';
};
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const $ = id => document.getElementById(id);
const clone = o => JSON.parse(JSON.stringify(o));

/* ── FINANCE ─────────────────────────────────────────── */
const randNorm = () => {
  let u=0,v=0;
  while(!u) u=Math.random(); while(!v) v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
};

const calcRRQ = (age,startAge,salary) => {
  if(age<startAge) return 0;
  let b=Math.min(salary*.25,15888), d=startAge-65;
  if(d<0) b*=(1+d*.054); else if(d>0) b*=(1+Math.min(d,7)*.042);
  return b;
};
const calcSV  = (age,startAge) => age<startAge ? 0 : 8000*(1+.072*Math.max(0,startAge-65));
const calcSRG = (age,svAge,srgAge,income,sv) => {
  if(age<svAge||age<srgAge) return 0;
  return Math.max(0,12000-Math.max(0,income-sv)*.5);
};
const calcTax = income => {
  if(income<=0) return 0;
  const fb=[55867,111733,173205],fr=[.15,.205,.26,.33];
  const qb=[49275,98540,119910], qr=[.15,.20,.2575,.2975];
  let t=0,p=0;
  for(let i=0;i<4;i++){const l=i<fb.length?fb[i]:income+1;t+=Math.max(0,Math.min(income,l)-p)*fr[i];p=l;if(income<=l)break;}
  p=0;
  for(let i=0;i<4;i++){const l=i<qb.length?qb[i]:income+1;t+=Math.max(0,Math.min(income,l)-p)*qr[i];p=l;if(income<=l)break;}
  return Math.max(0,t-.30*15705);
};

/* ── SIMULATION ──────────────────────────────────────── */
function buildOrder(strategy, accounts) {
  const order = STRAT[strategy] && STRAT[strategy].order;
  if(!order) return accounts.map(a=>a.id);
  const byType={};
  accounts.forEach(a=>(byType[a.type]=byType[a.type]||[]).push(a.id));
  const ids=[];
  order.forEach(t=>(byType[t]||[]).forEach(id=>ids.push(id)));
  accounts.forEach(a=>{ if(!ids.includes(a.id)) ids.push(a.id); });
  return ids;
}

function runSim(accounts, withdrawals, params, shocks) {
  if(!accounts.length) return [];
  const {ageFrom,ageTo,salary,ageRRQ,ageSV,ageSRG,strategy} = params;
  const bal={};
  accounts.forEach(a=>(bal[a.id]=a.balance));
  const pids = buildOrder(strategy,accounts);
  const rows=[];

  for(let age=ageFrom; age<=ageTo; age++){
    const yr = age-ageFrom;
    // Growth
    accounts.forEach(a=>{
      const sh = shocks&&shocks[a.id] ? (shocks[a.id][yr]||0) : 0;
      bal[a.id] = Math.max(0, bal[a.id]*(1+a.rate/100+sh));
    });
    // Recurring contributions
    accounts.forEach(a=>{
      if(age<a.contribStart||age>a.contribEnd) return;
      bal[a.id] += a.contribFreq==='monthly' ? a.contribAmt*12 : a.contribAmt;
    });
    // One-time contributions
    accounts.forEach(a=>(a.oneTime||[]).forEach(ot=>{
      if(ot.age===age) bal[a.id]+=ot.amount;
    }));

    const totalBefore = Object.values(bal).reduce((s,v)=>s+v,0);
    const rrq = calcRRQ(age,ageRRQ,salary);
    const sv  = calcSV(age,ageSV);
    const srg = calcSRG(age,ageSV,ageSRG,0,sv);
    const gov = rrq+sv+srg;

    let needed=0;
    withdrawals.forEach(w=>{
      if(age<w.startAge||age>w.endAge) return;
      needed += w.type==='fixed' ? w.amount : totalBefore*(w.amount/100);
    });

    let fp = Math.max(0, needed-gov);
    if(STRAT[strategy]&&STRAT[strategy].order) {
      pids.forEach(id=>{ if(fp<=0)return; const t=Math.min(bal[id]||0,fp); bal[id]-=t; fp-=t; });
    } else {
      const tt = Object.values(bal).reduce((s,v)=>s+v,0)||1;
      accounts.forEach(a=>{ bal[a.id]=Math.max(0,bal[a.id]-(bal[a.id]/tt)*fp); });
    }

    const totalBal = Math.round(Object.values(bal).reduce((s,v)=>s+v,0));
    const tax = Math.round(calcTax(Math.max(0,needed-gov)));
    rows.push({age,totalBalance:totalBal,rrq,sv,srg,gov,withdrawal:needed,tax,net:Math.round(needed+gov-tax)});

    if(totalBal<=0){
      for(let a2=age+1;a2<=ageTo;a2++)
        rows.push({age:a2,totalBalance:0,rrq,sv,srg,gov,withdrawal:needed,tax:0,net:0});
      break;
    }
  }
  return rows;
}

function runMC(accounts, withdrawals, params, N=200){
  if(!accounts.length) return null;
  const runs=[]; let ok=0;
  for(let i=0;i<N;i++){
    const sh={};
    accounts.forEach(a=>{
      const vol=(RISK[a.risk]||RISK.medium).vol;
      sh[a.id]={};
      for(let y=0;y<=params.ageTo-params.ageFrom+1;y++) sh[a.id][y]=randNorm()*vol;
    });
    const res=runSim(accounts,withdrawals,params,sh);
    runs.push(res);
    const last=res[res.length-1];
    if(last&&last.totalBalance>0) ok++;
  }
  const len=runs[0]?runs[0].length:0, cd=[];
  for(let i=0;i<len;i++){
    const vals=runs.map(r=>r[i]?r[i].totalBalance||0:0).sort((a,b)=>a-b);
    const p=f=>Math.max(0,vals[Math.floor(N*f)]||0);
    cd.push({age:runs[0][i].age,p10:p(.10),p25:p(.25),p50:p(.50),p75:p(.75),p90:p(.90)});
  }
  return {chartData:cd,successRate:Math.round(ok/N*100),N};
}

function suggestions(){
  const tips=[];
  const sr=S.mc?S.mc.successRate:100;
  const avgRate=S.accounts.length?S.accounts.reduce((s,a)=>s+a.rate,0)/S.accounts.length:0;
  if(sr<70)  tips.push({cls:'al-danger',icon:'🚨',text:`Probabilité de succès à ${sr}%. Augmentez les contributions ou réduisez les retraits.`});
  else if(sr<85) tips.push({cls:'al-warn',icon:'⚠️',text:`Probabilité ${sr}%. Ajouter 5 000$/an dans le CÉLI améliorerait votre retraite.`});
  if(!S.accounts.some(a=>a.type==='CELI'))
    tips.push({cls:'al-info',icon:'🌱',text:"Aucun CÉLI détecté. Les retraits y sont totalement libres d'impôt."});
  if(S.params.ageRRQ<65)
    tips.push({cls:'al-info',icon:'🕐',text:`RRQ à ${S.params.ageRRQ} ans = pénalité de ${((65-S.params.ageRRQ)*5.4).toFixed(0)}%. Attendre 70 ans ajoute 42%.`});
  if(S.accounts.length&&avgRate<4)
    tips.push({cls:'al-info',icon:'📈',text:`Rendement moyen ${avgRate.toFixed(1)}%/an. Des FNB diversifiés ciblent 6–8% sur 20+ ans.`});
  return tips.slice(0,3);
}

/* ── COMPUTE ─────────────────────────────────────────── */
let mcTimer=null;
function compute(){
  S.sim = runSim(S.accounts,S.withdrawals,S.params,null);
  clearTimeout(mcTimer);
  S.mcRunning=true;
  updateTag();
  mcTimer=setTimeout(()=>{
    S.mc=runMC(S.accounts,S.withdrawals,S.params);
    S.mcRunning=false;
    updateTag();
    if(S.tab==='dashboard'||S.tab==='monte') { renderMain(); }
    else { refreshCharts(); }
  },380);
}

/* ── CANVAS CHARTS ───────────────────────────────────── */
function niceMax(v){ if(!v||v<=0)return 1; const m=Math.pow(10,Math.floor(Math.log10(v))); return Math.ceil(v/m)*m; }

function setupCanvas(id){
  const cv=$(id); if(!cv) return null;
  const dpr=window.devicePixelRatio||1;
  const W=cv.offsetWidth||600, H=cv.offsetHeight||300;
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  return {cv,ctx,W,H};
}

function drawGrid(ctx,pad,iW,iH,max,ages){
  // Y grid + labels
  [0,.25,.5,.75,1].forEach(f=>{
    const y=pad.t+iH*(1-f);
    ctx.strokeStyle='#F1F5F9'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+iW,y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#94A3B8'; ctx.font='9px sans-serif'; ctx.textAlign='right';
    ctx.fillText(fmtK(max*f),pad.l-4,y+3);
  });
  // X labels
  const n=ages.length, step=n>60?10:n>30?5:n>15?2:1;
  ctx.fillStyle='#94A3B8'; ctx.font='9px sans-serif'; ctx.textAlign='center';
  ages.forEach((age,i)=>{
    if(age%step!==0) return;
    const x=pad.l+(i/(n-1||1))*iW;
    ctx.fillText(age,x,pad.t+iH+14);
  });
  // Axes
  ctx.strokeStyle='#E2E8F0'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad.l,pad.t); ctx.lineTo(pad.l,pad.t+iH); ctx.lineTo(pad.l+iW,pad.t+iH); ctx.stroke();
}

function drawMainChart(id){
  const s=setupCanvas(id); if(!s) return;
  const {ctx,W,H}=s;
  const pad={t:10,r:14,b:22,l:52};
  const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  if(iW<=0||iH<=0) return;

  const sim=S.sim, mc=S.mc;
  if(!sim.length) return;
  const ages=sim.map(r=>r.age);
  const n=sim.length;

  // Compute max
  let max=0;
  sim.forEach(r=>{ if(r.totalBalance>max) max=r.totalBalance; });
  if(mc) mc.chartData.forEach(r=>{ if(r.p90>max) max=r.p90; });
  max=niceMax(max);

  ctx.clearRect(0,0,W,H);
  drawGrid(ctx,pad,iW,iH,max,ages);

  const px=(i,v)=>({x:pad.l+(i/(n-1||1))*iW, y:pad.t+iH-(v/max)*iH});

  // MC bands
  if(mc&&mc.chartData.length){
    const D=mc.chartData, nd=D.length;
    const pxmc=(i,v)=>({x:pad.l+(i/(nd-1||1))*iW, y:pad.t+iH-(v/max)*iH});

    // P10–P90 band
    ctx.beginPath();
    D.forEach((d,i)=>{ const p=pxmc(i,d.p10); i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
    for(let i=nd-1;i>=0;i--){ const p=pxmc(i,D[i].p90); ctx.lineTo(p.x,p.y); }
    ctx.closePath(); ctx.fillStyle='rgba(37,99,235,.10)'; ctx.fill();

    // P25–P75 band
    ctx.beginPath();
    D.forEach((d,i)=>{ const p=pxmc(i,d.p25); i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
    for(let i=nd-1;i>=0;i--){ const p=pxmc(i,D[i].p75); ctx.lineTo(p.x,p.y); }
    ctx.closePath(); ctx.fillStyle='rgba(37,99,235,.22)'; ctx.fill();

    // Median
    ctx.beginPath();
    D.forEach((d,i)=>{ const p=pxmc(i,d.p50); i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
    ctx.strokeStyle='#7C3AED'; ctx.lineWidth=1.5; ctx.setLineDash([6,3]); ctx.stroke(); ctx.setLineDash([]);

    // P10 line
    ctx.beginPath();
    D.forEach((d,i)=>{ const p=pxmc(i,d.p10); i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
    ctx.strokeStyle='rgba(239,68,68,.55)'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
  }

  // Base area
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+iH);
  grad.addColorStop(0,'rgba(37,99,235,.38)');
  grad.addColorStop(1,'rgba(37,99,235,.02)');
  ctx.beginPath();
  sim.forEach((r,i)=>{ const p=px(i,r.totalBalance); i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
  ctx.lineTo(px(n-1,0).x,pad.t+iH); ctx.lineTo(pad.l,pad.t+iH); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();

  // Base line
  ctx.beginPath();
  sim.forEach((r,i)=>{ const p=px(i,r.totalBalance); i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
  ctx.strokeStyle='#2563EB'; ctx.lineWidth=2.5; ctx.stroke();

  // Retirement reference line
  const retAge=S.params.ageRRQ;
  const ri=sim.findIndex(r=>r.age>=retAge);
  if(ri>=0){
    const rx=pad.l+(ri/(n-1||1))*iW;
    ctx.strokeStyle='rgba(13,148,136,.6)'; ctx.lineWidth=1; ctx.setLineDash([5,3]);
    ctx.beginPath(); ctx.moveTo(rx,pad.t); ctx.lineTo(rx,pad.t+iH); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#0D9488'; ctx.font='bold 9px sans-serif'; ctx.textAlign='left';
    ctx.fillText('Retraite',rx+3,pad.t+10);
  }
}

function drawSmallChart(id,vals,color){
  const s=setupCanvas(id); if(!s) return;
  const {ctx,W,H}=s;
  const pad={t:8,r:10,b:18,l:46};
  const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  if(iW<=0||iH<=0||!vals.length) return;
  const max=niceMax(Math.max(...vals)||1);
  const n=vals.length;
  ctx.clearRect(0,0,W,H);

  // Grid
  [0,.5,1].forEach(f=>{
    const y=pad.t+iH*(1-f);
    ctx.strokeStyle='#F1F5F9'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+iW,y); ctx.stroke();
    ctx.setLineDash([]);
    if(f>0){ ctx.fillStyle='#94A3B8'; ctx.font='9px sans-serif'; ctx.textAlign='right'; ctx.fillText(fmtK(max*f),pad.l-3,y+3); }
  });
  ctx.strokeStyle='#E2E8F0'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad.l,pad.t); ctx.lineTo(pad.l,pad.t+iH); ctx.lineTo(pad.l+iW,pad.t+iH); ctx.stroke();

  // Fill + line
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+iH);
  grad.addColorStop(0,color+'44'); grad.addColorStop(1,color+'06');
  ctx.beginPath();
  vals.forEach((v,i)=>{ const x=pad.l+(i/(n-1||1))*iW,y=pad.t+iH-(v/max)*iH; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.lineTo(pad.l+iW,pad.t+iH); ctx.lineTo(pad.l,pad.t+iH); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath();
  vals.forEach((v,i)=>{ const x=pad.l+(i/(n-1||1))*iW,y=pad.t+iH-(v/max)*iH; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
}

          <div class="field-lbl" style="margin-bottom:4px">Type de compte</div>
          <select class="sel" data-a="ma-type">
            ${Object.entries(ACCT).map(([k,v])=>`<option value="${k}" ${a.type===k?'selected':''}>${v.icon} ${v.label}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="info-box" style="background:${def.color}12;color:${def.color};font-weight:600">${def.tax}</div>
      <div class="g2">
        <div>
          <div class="field-lbl" style="margin-bottom:4px">Solde actuel</div>
          <div class="irow"><span class="pfx">$</span><input type="number" value="${a.balance}" data-a="ma-balance"></div>
        </div>
        <div>
          <div class="field-lbl" style="margin-bottom:4px">Rendement attendu</div>
          <div class="irow"><input type="number" value="${a.rate}" step="0.5" min="0" max="20" data-a="ma-rate"><span class="sfx">%/an</span></div>
        </div>
      </div>
      <div>
        <div class="field-lbl" style="margin-bottom:6px">Niveau de risque (Monte Carlo)</div>
        <div class="risk-btns">
          ${Object.entries(RISK).map(([k,v])=>`
            <button class="risk-btn" data-a="ma-risk" data-v="${k}"
              style="border-color:${a.risk===k?v.color:'#E2E8F0'};background:${a.risk===k?v.color+'12':'#fff'};color:${a.risk===k?v.color:'#64748B'}">
              ${v.label}<small>σ = ${Math.round(v.vol*100)}%</small>
            </button>`).join('')}
        </div>
      </div>
      <hr class="div">
      <div>
        <div class="field-lbl" style="margin-bottom:6px">Contributions récurrentes</div>
        <div class="g4">
          <div><div style="font-size:10px;color:#64748B;margin-bottom:3px">Montant</div>
               <input class="inp" type="number" value="${a.contribAmt}" data-a="ma-camount"></div>
          <div><div style="font-size:10px;color:#64748B;margin-bottom:3px">De (âge)</div>
               <input class="inp" type="number" value="${a.contribStart}" data-a="ma-cstart"></div>
          <div><div style="font-size:10px;color:#64748B;margin-bottom:3px">À (âge)</div>
               <input class="inp" type="number" value="${a.contribEnd}" data-a="ma-cend"></div>
          <div><div style="font-size:10px;color:#64748B;margin-bottom:3px">Fréq.</div>
               <select class="sel" data-a="ma-cfreq">
                 <option value="annual"  ${a.contribFreq==='annual' ?'selected':''}>Ann.</option>
                 <option value="monthly" ${a.contribFreq==='monthly'?'selected':''}>Mens.</option>
               </select></div>
        </div>
      </div>
      <hr class="div">
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div class="field-lbl">Contributions ponctuelles</div>
          <button class="btn btn-sm" style="border:1px solid ${def.color};background:${def.color}10;color:${def.color}" data-a="add-ot">+ Ajouter</button>
        </div>
        ${!(a.oneTime&&a.oneTime.length)?'<p style="font-size:11px;color:#64748B;font-style:italic">Ex : héritage, bonus, vente d\'actif…</p>':''}
        ${otRows}
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" data-a="close-modal">Annuler</button>
      <button class="btn btn-primary" data-a="save-modal">Enregistrer</button>
    </div>
  `;
}
function saveModal(){
  const a=S.modalAcct; if(!a) return;
  if(a._new){ delete a._new; S.accounts.push(a); }
  else { const i=S.accounts.findIndex(x=>x.id===a.id); if(i>=0) S.accounts[i]=a; }
  closeModal(); compute(); renderMain();
}

/* ── RENDER ──────────────────────────────────────────── */
function updateTag(){
  const el=$('topbar-tag');
  if(el) el.innerHTML=S.mcRunning?'<span class="spin"></span> Simulation…':`${S.accounts.length} compte${S.accounts.length!==1?'s':''}`;
}
function renderTopbar(){
  $('topbar').innerHTML=`
    <div class="logo">RetirePlan <b>QC</b></div>
    ${TABS.map(t=>`<button class="tab-btn ${S.tab===t.id?'on':''}" data-a="tab" data-v="${t.id}">${t.icon} ${t.label}</button>`).join('')}
    <div class="topbar-tag" id="topbar-tag">${S.accounts.length} compte${S.accounts.length!==1?'s':''}</div>
  `;
}
function renderMain(){
  const pages={dashboard:pageDashboard,accounts:pageAccounts,withdrawals:pageWithdrawals,params:pageParams,monte:pageMonte};
  $('main').innerHTML=(pages[S.tab]||pageDashboard)();
  requestAnimationFrame(refreshCharts);
}
function render(){ renderTopbar(); renderMain(); }

/* ── EVENTS ──────────────────────────────────────────── */
document.addEventListener('click', e=>{
  const el=e.target.closest('[data-a]'); if(!el) return;
  const a=el.dataset.a, v=el.dataset.v, i=el.dataset.i!==undefined?+el.dataset.i:null;

  if(a==='tab')         { S.tab=v; render(); return; }
  if(a==='close-modal') { closeModal(); return; }
  if(a==='save-modal')  { saveModal(); return; }
  if(a==='add-acct')    { openModal({id:uid(),name:'Nouveau',type:'CELI',balance:0,contribAmt:5000,contribFreq:'annual',contribStart:S.params.ageFrom,contribEnd:S.params.ageFrom+40,oneTime:[],rate:5,risk:'medium',_new:true}); return; }
  if(a==='edit-acct')   { openModal(S.accounts[i]); return; }
  if(a==='del-acct')    { S.accounts.splice(i,1); compute(); renderMain(); return; }
  if(a==='add-w')       { S.withdrawals.push({id:uid(),startAge:65,endAge:100,amount:30000,type:'fixed'}); renderMain(); return; }
  if(a==='del-w')       { S.withdrawals.splice(i,1); compute(); renderMain(); return; }
  if(a==='strategy')    { S.params.strategy=v; compute(); renderMain(); return; }
  // Modal
  if(!S.modalAcct) return;
  const ma=S.modalAcct;
  if(a==='ma-risk') { ma.risk=v; renderModal(); return; }
  if(a==='add-ot')  { ma.oneTime=ma.oneTime||[]; ma.oneTime.push({id:uid(),age:35,amount:10000}); renderModal(); return; }
  if(a==='del-ot')  { ma.oneTime.splice(i,1); renderModal(); return; }
});

document.addEventListener('input', e=>{
  const el=e.target, a=el.dataset.a;
  if(!a) return;

  if(a==='param')       { S.params[el.dataset.k]=+el.value; compute(); return; }
  if(a==='param-range') { S.params[el.dataset.k]=+el.value; compute(); renderMain(); return; }
  if(a==='w-field')     { S.withdrawals[+el.dataset.i][el.dataset.k]=+el.value; compute(); return; }
  if(a==='w-type')      { S.withdrawals[+el.dataset.i].type=el.value; compute(); return; }

  if(!S.modalAcct) return;
  const ma=S.modalAcct;
  if(a==='ma-name')    { ma.name=el.value; return; }
  if(a==='ma-type')    { ma.type=el.value; renderModal(); return; }
  if(a==='ma-balance') { ma.balance=+el.value; return; }
  if(a==='ma-rate')    { ma.rate=+el.value; return; }
  if(a==='ma-camount') { ma.contribAmt=+el.value; return; }
  if(a==='ma-cstart')  { ma.contribStart=+el.value; return; }
  if(a==='ma-cend')    { ma.contribEnd=+el.value; return; }
  if(a==='ma-cfreq')   { ma.contribFreq=el.value; return; }
  if(a==='ot-age')     { ma.oneTime[+el.dataset.i].age=+el.value; return; }
  if(a==='ot-amount')  { ma.oneTime[+el.dataset.i].amount=+el.value; return; }
});

// Close modal on overlay click
$('overlay').addEventListener('click', e=>{ if(e.target===$('overlay')) closeModal(); });

window.addEventListener('resize', ()=>requestAnimationFrame(refreshCharts));

/* ── INIT ────────────────────────────────────────────── */
compute();
render();
</script>
</body>
</html>
