<style>
/* ── Reset ─────────────────────────────────────────── */

/* ── Modal ─────────────────────────────────────────── */

/* ── Withdrawal row ────────────────────────────────── */
.w-row { display: flex; flex-wrap: wrap; gap: 9px; align-items: flex-end;

/* ── Alerts ────────────────────────────────────────── */

/* ── Chart legend ──────────────────────────────────── */

               font-size: 11px; color: #64748B; }

<body>
<div id="root"></div>
<script type="text/babel">
/* ── Destructure globals ─────────────────────────────────────────────────── */
const { useState, useMemo, useEffect } = React;
const { ComposedChart, Area, Line, XAxis, YAxis,
        CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = Recharts;

/* ── Config ──────────────────────────────────────────────────────────────── */
const CLR = {
  navy:'#0F172A', blue:'#2563EB', teal:'#0D9488', green:'#10B981',
  amber:'#F59E0B', red:'#EF4444', purple:'#7C3AED', muted:'#64748B',
};

const ACCT_TYPES = {
  REER:   { label:'REER',           icon:'🏦', color:'#2563EB', tax:'Déductible · Imposable au retrait' },
  CELI:   { label:'CÉLI',           icon:'🌱', color:'#10B981', tax:'Retraits libres d\'impôt' },
  NONREG: { label:'Non enregistré', icon:'📈', color:'#F59E0B', tax:'50 % des gains en capital imposables' },
  IMMO:   { label:'Immobilier',     icon:'🏠', color:'#7C3AED', tax:'Valeur nette estimée' },
  AUTRE:  { label:'Autre actif',    icon:'💼', color:'#64748B', tax:'Actif personnalisé' },
};

const RISK = {
  low:    { label:'Faible',  vol:.05, color:'#10B981' },
  medium: { label:'Modéré',  vol:.12, color:'#F59E0B' },
  high:   { label:'Élevé',   vol:.20, color:'#EF4444' },
};

const STRAT = {
  'celi-first': { label:'CÉLI d\'abord',  order:['CELI','NONREG','REER','IMMO','AUTRE'] },
  'reer-first': { label:'REER d\'abord',  order:['REER','NONREG','CELI','IMMO','AUTRE'] },
  'balanced':   { label:'Proportionnel',  order:null },
};

const uid = () => Math.random().toString(36).slice(2,8);

/* ── Helpers ─────────────────────────────────────────────────────────────── */
const fmtK = v => {
  if (!isFinite(v) || isNaN(v)) return '—';
  const a = Math.abs(v);
  if (a >= 1e6) return (v/1e6).toFixed(1) + 'M$';
  if (a >= 1e3) return (v/1e3).toFixed(0) + 'k$';
  return Math.round(v) + '$';
};

/* ── Financial math ──────────────────────────────────────────────────────── */
const randNorm = () => {
  let u = 0, v = 0;
  while (!u) u = Math.random();
  while (!v) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
};

const calcRRQ = (age, startAge, salary) => {
  if (age < startAge) return 0;
  let b = Math.min(salary * 0.25, 15888);
  const d = startAge - 65;
  if (d < 0) b *= (1 + d * 0.054);
  else if (d > 0) b *= (1 + Math.min(d, 7) * 0.042);
  return b;
};

const calcSV = (age, startAge) => {
  if (age < startAge) return 0;
  return 8000 * (1 + 0.072 * Math.max(0, startAge - 65));
};

const calcSRG = (age, svAge, srgAge, income, sv) => {
  if (age < svAge || age < srgAge) return 0;
  return Math.max(0, 12000 - Math.max(0, income - sv) * 0.5);
};

const calcTax = income => {
  if (income <= 0) return 0;
  const fb = [55867, 111733, 173205], fr = [.15, .205, .26, .33];
  const qb = [49275, 98540, 119910],  qr = [.15, .20, .2575, .2975];
  let tax = 0, p = 0;
  for (let i = 0; i < 4; i++) {
    const lim = i < fb.length ? fb[i] : income + 1;
    tax += Math.max(0, Math.min(income, lim) - p) * fr[i];
    p = lim; if (income <= lim) break;
  }
  p = 0;
  for (let i = 0; i < 4; i++) {
    const lim = i < qb.length ? qb[i] : income + 1;
    tax += Math.max(0, Math.min(income, lim) - p) * qr[i];
    p = lim; if (income <= lim) break;
  }
  return Math.max(0, tax - 0.30 * 15705);
};

/* ── Simulation ──────────────────────────────────────────────────────────── */
function buildOrder(strategy, accounts) {
  const order = STRAT[strategy]?.order;
  if (!order) return accounts.map(a => a.id);
  const byType = {};
  accounts.forEach(a => (byType[a.type] = byType[a.type] || []).push(a.id));
  const ids = [];
  order.forEach(t => (byType[t] || []).forEach(id => ids.push(id)));
  accounts.forEach(a => { if (!ids.includes(a.id)) ids.push(a.id); });
  return ids;
}

function runSim(accounts, withdrawals, params, shocks) {
  if (!accounts.length) return [];
  const { ageFrom, ageTo, salary, ageRRQ, ageSV, ageSRG, strategy } = params;
  const bal = {};
  accounts.forEach(a => (bal[a.id] = a.balance));
  const pids = buildOrder(strategy, accounts);
  const rows = [];

  for (let age = ageFrom; age <= ageTo; age++) {
    const yr = age - ageFrom;

    // Growth
    accounts.forEach(a => {
      const shock = shocks ? (shocks[a.id] ? shocks[a.id][yr] || 0 : 0) : 0;
      bal[a.id] = Math.max(0, bal[a.id] * (1 + a.rate / 100 + shock));
    });
    // Recurring contribs
    accounts.forEach(a => {
      if (age < a.contribStart || age > a.contribEnd) return;
      bal[a.id] += a.contribFreq === 'monthly' ? a.contribAmt * 12 : a.contribAmt;
    });
    // One-time
    accounts.forEach(a => (a.oneTime || []).forEach(ot => {
      if (ot.age === age) bal[a.id] += ot.amount;
    }));

    const totalBefore = Object.values(bal).reduce((s, v) => s + v, 0);

    // Government
    const rrq = calcRRQ(age, ageRRQ, salary);
    const sv  = calcSV(age, ageSV);
    const srg = calcSRG(age, ageSV, ageSRG, 0, sv);
    const gov = rrq + sv + srg;

    // Withdrawals
    let needed = 0;
    withdrawals.forEach(w => {
      if (age < w.startAge || age > w.endAge) return;
      needed += w.type === 'fixed' ? w.amount : totalBefore * (w.amount / 100);
    });

    // Decumulation
    let fromPort = Math.max(0, needed - gov);
    if (STRAT[strategy]?.order) {
      pids.forEach(id => {
        if (fromPort <= 0) return;
        const take = Math.min(bal[id] || 0, fromPort);
        bal[id] -= take; fromPort -= take;
      });
    } else {
      const total = Object.values(bal).reduce((s, v) => s + v, 0) || 1;
      accounts.forEach(a => {
        bal[a.id] = Math.max(0, bal[a.id] - (bal[a.id] / total) * fromPort);
      });
    }

    const totalBal = Math.round(Object.values(bal).reduce((s, v) => s + v, 0));
    const tax = Math.round(calcTax(Math.max(0, needed - gov)));

    rows.push({ age, totalBalance: totalBal, rrq, sv, srg, gov,
                withdrawal: needed, tax, net: Math.round(needed + gov - tax) });

    if (totalBal <= 0) {
      for (let a2 = age + 1; a2 <= ageTo; a2++) {
        rows.push({ age: a2, totalBalance: 0, rrq, sv, srg, gov,
                    withdrawal: needed, tax: 0, net: 0 });
      }
      break;
    }
  }
  return rows;
}

function runMC(accounts, withdrawals, params, N = 200) {
  if (!accounts.length) return null;
  const runs = [];
  let ok = 0;

  for (let i = 0; i < N; i++) {
    const shocks = {};
    accounts.forEach(a => {
      const vol = RISK[a.risk]?.vol || .12;
      shocks[a.id] = {};
      for (let y = 0; y <= params.ageTo - params.ageFrom + 1; y++) {
        shocks[a.id][y] = randNorm() * vol;
      }
    });
    const res = runSim(accounts, withdrawals, params, shocks);
    runs.push(res);
    if ((res[res.length - 1]?.totalBalance || 0) > 0) ok++;
  }

  const len = runs[0]?.length || 0;
  const chartData = [];
  for (let i = 0; i < len; i++) {
    const vals = runs.map(r => r[i]?.totalBalance || 0).sort((a, b) => a - b);
    const p = f => Math.max(0, vals[Math.floor(N * f)] || 0);
    const [p10, p25, p50, p75, p90] = [.10,.25,.50,.75,.90].map(p);
    chartData.push({
      age: runs[0][i].age, p10, p50, p90,
      b0: p10,
      b1: Math.max(0, p25 - p10),
      b2: Math.max(0, p75 - p25),
      b3: Math.max(0, p90 - p75),
    });
  }

  return { chartData, successRate: Math.round(ok / N * 100), N };
}

function getSuggestions(sim, params, accounts, mc) {
  const tips = [];
  const sr = mc ? mc.successRate : 100;
  const avgRate = accounts.length
    ? accounts.reduce((s, a) => s + a.rate, 0) / accounts.length : 0;

  if (sr < 70)
    tips.push({ level:'danger', icon:'🚨',
      text: `Probabilité de succès à ${sr}%. Augmentez les contributions ou réduisez les retraits.` });
  else if (sr < 85)
    tips.push({ level:'warn', icon:'⚠️',
      text: `Probabilité ${sr}%. Ajouter 5 000$/an dans le CÉLI améliorerait votre retraite.` });

  if (!accounts.some(a => a.type === 'CELI'))
    tips.push({ level:'info', icon:'🌱',
      text: 'Aucun CÉLI détecté. Les retraits y sont totalement libres d\'impôt.' });

  if (params.ageRRQ < 65)
    tips.push({ level:'info', icon:'🕐',
      text: `RRQ à ${params.ageRRQ} ans = pénalité de ${((65 - params.ageRRQ) * 5.4).toFixed(0)}%. Attendre 70 ans ajoute 42%.` });

  if (accounts.length && avgRate < 4)
    tips.push({ level:'info', icon:'📈',
      text: `Rendement moyen ${avgRate.toFixed(1)}%/an. Des FNB diversifiés ciblent 6–8% sur 20+ ans.` });

  return tips.slice(0, 3);
}

/* ── Default data ────────────────────────────────────────────────────────── */
const DEF_ACCOUNTS = [
  { id:uid(), name:'REER', type:'REER', balance:50000,
    contribAmt:10000, contribFreq:'annual', contribStart:25, contribEnd:65,
    oneTime:[], rate:6, risk:'medium' },
  { id:uid(), name:'CÉLI', type:'CELI', balance:20000,
    contribAmt:6000,  contribFreq:'annual', contribStart:25, contribEnd:65,
    oneTime:[], rate:5, risk:'low' },
];
const DEF_WITHDRAWALS = [{ id:uid(), startAge:65, endAge:100, amount:45000, type:'fixed' }];
const DEF_PARAMS = {
  ageFrom:25, ageTo:95, salary:80000,
  ageRRQ:65, ageSV:65, ageSRG:60, strategy:'celi-first',
};

/* ── Micro components ────────────────────────────────────────────────────── */
function KPI({ label, value, sub, color }) {
  return (
    <div className="kpi">
      <div className="kpi-lbl">{label}</div>
      <div className="kpi-val" style={{ color: color || CLR.navy }}>{value}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
    </div>
  );
}

function Field({ label, hint, children }) {
  return (
    <div className="field">
      {label && <div className="field-lbl">{label}</div>}
      {children}
      {hint && <div className="field-hint">{hint}</div>}
    </div>
  );
}

function NumInput({ value, onChange, prefix, suffix, min, max, step = 1 }) {
  return (
    <div className="irow">
      {prefix && <span className="pfx">{prefix}</span>}
      <input type="number" value={value} min={min} max={max} step={step}
        onChange={e => onChange(+e.target.value)} />
      {suffix && <span className="sfx">{suffix}</span>}
    </div>
  );
}

function Gauge({ pct }) {
  const color = pct >= 80 ? CLR.green : pct >= 65 ? CLR.amber : CLR.red;
  const arc   = Math.min(1, pct / 100) * 157;
  const lbl   = pct >= 80 ? 'Excellent' : pct >= 70 ? 'Bon' : pct >= 60 ? 'À améliorer' : 'Risqué';
  return (
    <div className="gauge">

function ChartTip({ active, payload, label }) {
  if (!active || !payload || !payload.length) return null;
  const get = key => { const p = payload.find(x => x.dataKey === key); return p ? p.value : null; };
  const entries = [
    { key:'base', lbl:'Base',     color: CLR.blue   },
    { key:'p50',  lbl:'Médiane',  color: CLR.purple  },
    { key:'p10',  lbl:'P10',      color: CLR.red     },
    { key:'p90',  lbl:'P90',      color: CLR.green   },
  ].filter(e => get(e.key) != null);
  return (
    <div style={{ background:'#fff', border:'1px solid #E2E8F0', borderRadius:10,
                  padding:'10px 14px', fontSize:12, boxShadow:'0 4px 16px rgba(0,0,0,.1)', minWidth:150 }}>
      <div style={{ fontWeight:700, fontSize:13, color:CLR.navy, marginBottom:6,
                    paddingBottom:5, borderBottom:'1px solid #F1F5F9' }}>{label} ans</div>
      {entries.map(({ key, lbl, color }) => (
        <div key={key} style={{ display:'flex', justifyContent:'space-between', gap:14, marginBottom:3 }}>
          <span style={{ color:CLR.muted }}>{lbl}</span>
          <b style={{ color }}>{fmtK(get(key))}</b>
        </div>
      ))}
    </div>
  );
}

/* ── Chart data builder ──────────────────────────────────────────────────── */
function buildChartData(sim, mc) {
  return sim.map((r, i) => {
    const m = (mc && mc.chartData && mc.chartData[i]) ? mc.chartData[i] : {};
    return {
      age:  r.age,
      base: r.totalBalance,
      p10:  m.p10,
      p50:  m.p50,
      p90:  m.p90,
      b0:   m.p10,
      b1:   Math.max(0, (m.p25 || 0) - (m.p10 || 0)),
      b2:   Math.max(0, (m.p75 || 0) - (m.p25 || 0)),
      b3:   Math.max(0, (m.p90 || 0) - (m.p75 || 0)),
    };
  });
}

/* ── MC bands (shared sub-component) ────────────────────────────────────── */
function MCBands({ mc }) {
  if (!mc) return null;
  return (
    <>
      <Area stackId="mc" type="monotone" dataKey="b0" stroke="none" fill="transparent" dot={false}/>
      <Area stackId="mc" type="monotone" dataKey="b1" stroke="none" fill={`${CLR.blue}18`} dot={false}/>
      <Area stackId="mc" type="monotone" dataKey="b2" stroke="none" fill={`${CLR.blue}30`} dot={false}/>
      <Area stackId="mc" type="monotone" dataKey="b3" stroke="none" fill={`${CLR.blue}18`} dot={false}/>
      <Line type="monotone" dataKey="p50" stroke={CLR.purple}
        strokeWidth={1.5} dot={false} strokeDasharray="6 3" name="Médiane"/>
    </>
  );
}

            { lbl:'P90 — Optimiste',    key:'p90',  color:CLR.green  },
            { lbl:'Base (taux fixes)',  key:'base', color:CLR.navy   },
          ].map(({ lbl, key, color }) => {
            const val = key === 'base' ? last.totalBalance : lastMC[key];
            return (
              <div key={key} style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
                padding:'10px 0', borderBottom:'1px solid #F1F5F9' }}>
                <span style={{ fontSize:12, color, fontWeight:600 }}>{lbl}</span>
                <span style={{ fontWeight:800, fontSize:16, color }}>{val != null ? fmtK(val) : '…'}</span>
              </div>
            );
          })}
          <p style={{ fontSize:10, color:CLR.muted, marginTop:10 }}>
            N={mc ? mc.N : 200} simulations · Volatilité calibrée par niveau de risque
          </p>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <span>Éventail des scénarios · {params.ageFrom}→{params.ageTo} ans</span>
          <span style={{ fontSize:11, color:CLR.muted }}>N = {mc ? mc.N : 200}</span>
        </div>
        <div style={{ padding:'12px 4px 0' }}>
          <ResponsiveContainer width="100%" height={320}>
            <ComposedChart data={chartData} margin={{ top:4, right:16, left:0, bottom:0 }}>
              <CartesianGrid stroke="#F1F5F9" strokeDasharray="3 3"/>
              <XAxis dataKey="age" stroke={CLR.muted} tick={{ fontSize:10 }}/>
              <YAxis tickFormatter={fmtK} stroke={CLR.muted} tick={{ fontSize:9 }} width={46}/>
              <Tooltip content={<ChartTip/>}/>
              <ReferenceLine x={retAge} stroke={CLR.teal} strokeDasharray="5 3"
                label={{ value:'Retraite', fill:CLR.teal, fontSize:10 }}/>
              <MCBands mc={mc}/>
              {mc && <Line type="monotone" dataKey="p10" stroke={`${CLR.red}80`}
                strokeWidth={1.5} dot={false} strokeDasharray="4 3" name="P10"/>}
              <Line type="monotone" dataKey="base" stroke={CLR.navy} strokeWidth={2.5} dot={false} name="Base"/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>
        <div className="legend">
          <div className="li"><span className="ll" style={{ background:CLR.navy }}/> Base</div>
          <div className="li"><span className="ll" style={{ background:CLR.purple, opacity:.8 }}/> Médiane P50</div>
          <div className="li"><span className="la" style={{ background:`${CLR.blue}30` }}/> Zone P25–P75</div>
          <div className="li"><span className="ll" style={{ background:CLR.red, opacity:.7 }}/> P10 (pessimiste)</div>
        </div>
      </div>
    </>
  );
}

/* ── Root ────────────────────────────────────────────────────────────────── */
const TABS = [
  { id:'dashboard',    icon:'📊', label:'Tableau de bord' },
  { id:'accounts',    icon:'💰', label:'Placements'       },
  { id:'withdrawals', icon:'📉', label:'Retraits'          },
  { id:'params',      icon:'⚙️', label:'Paramètres'        },
  { id:'monte',       icon:'🧠', label:'Monte Carlo'       },
];

function App() {
  const [accounts,    setAccounts]    = useState(DEF_ACCOUNTS);
  const [withdrawals, setWithdrawals] = useState(DEF_WITHDRAWALS);
  const [params,      setParams]      = useState(DEF_PARAMS);
  const [tab,         setTab]         = useState('dashboard');
  const [mc,          setMc]          = useState(null);
  const [mcRunning,   setMcRunning]   = useState(false);

  const sim = useMemo(
    () => runSim(accounts, withdrawals, params, null),
    [accounts, withdrawals, params]
  );

  useEffect(() => {
    setMcRunning(true);
    const t = setTimeout(() => {
      setMc(runMC(accounts, withdrawals, params));
      setMcRunning(false);
    }, 400);
    return () => clearTimeout(t);
  }, [accounts, withdrawals, params]);

  const suggestions = useMemo(
    () => getSuggestions(sim, params, accounts, mc),
    [sim, params, accounts, mc]
  );

  return (
    <div className="app">
      <nav className="topbar">
        <div className="logo">RetirePlan <span>QC</span></div>
        {TABS.map(t => (
          <button key={t.id}
            className={`tab-btn ${tab === t.id ? 'on' : ''}`}
            onClick={() => setTab(t.id)}>
            {t.icon} {t.label}
          </button>
        ))}
        <div className="tag">
          {mcRunning
            ? <><span className="spinner"/>Simulation…</>
            : `${accounts.length} compte${accounts.length !== 1 ? 's' : ''}`}
        </div>
      </nav>

      <main className="main">
        {tab === 'dashboard'   && <PageDashboard   sim={sim} mc={mc} params={params} accounts={accounts} suggestions={suggestions}/>}
        {tab === 'accounts'    && <PageAccounts    accounts={accounts} setAccounts={setAccounts} params={params}/>}
        {tab === 'withdrawals' && <PageWithdrawals withdrawals={withdrawals} setWithdrawals={setWithdrawals} params={params} setParams={setParams}/>}
        {tab === 'params'      && <PageParams      params={params} setParams={setParams}/>}
        {tab === 'monte'       && <PageMonte       sim={sim} mc={mc} params={params}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
