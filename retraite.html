<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RetirePlan QC</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#F0F4F8;font-family:Arial,sans-serif;font-size:14px;color:#1A1A1A}
input,select,button{font-family:Arial,sans-serif}
button{cursor:pointer}
input[type=range]{width:100%;margin-top:5px;cursor:pointer}
a{color:rgb(9,87,151)}

.app{display:flex;flex-direction:column;height:100vh}
.topbar{background:rgb(9,87,151);padding:14px 22px;flex-shrink:0}
.topbar h1{color:#fff;font-size:19px;font-weight:700;margin-bottom:2px}
.topbar p{color:rgba(255,255,255,.72);font-size:12px}
.or-bar{height:3px;background:rgb(240,150,134);border-radius:2px;margin-top:9px;width:55px}
.nav{background:rgb(9,87,151);border-top:1px solid rgba(255,255,255,.15);display:flex;padding:0 22px;overflow-x:auto;flex-shrink:0}
.tab-btn{padding:9px 13px;border:none;background:transparent;color:rgba(255,255,255,.52);font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tab-btn.on{color:#fff;border-bottom-color:rgb(240,150,134)}
.main{flex:1;overflow-y:auto;padding:16px 22px}

/* Section */
.sec{margin-bottom:18px}
.sec-head{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.sec-num{background:rgb(9,87,151);color:#fff;border-radius:50%;width:23px;height:23px;min-width:23px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.sec-title{color:rgb(9,87,151);font-size:14px;font-weight:700}
.sec-line{flex:1;height:1px;background:rgba(9,87,151,.25)}

/* Cards */
.card{background:#fff;border:1px solid #CCC;border-radius:4px}
.cp{padding:14px}
.ch{padding:8px 14px;border-bottom:1px solid #E0E0E0;font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:10px}
hr.dv{border:none;border-top:1px solid #E0E0E0;margin:8px 0}

/* KPI */
.kpis{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.kpi{background:#fff;border:1px solid #CCC;border-radius:4px;border-top:3px solid rgb(9,87,151);flex:1 1 120px;padding:10px 13px}
.kpi-l{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-v{font-size:18px;font-weight:700;color:rgb(9,87,151);margin-bottom:2px}
.kpi-s{font-size:10px;color:#888}

/* Forms */
.lbl{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;display:block}
.hint{font-size:10px;color:#888;margin-top:2px}
.inp{width:100%;padding:6px 9px;border:1px solid #CCC;border-radius:3px;font-size:13px;font-weight:700;color:#1A1A1A;outline:none;background:#fff}
.inp:focus{border-color:rgb(9,87,151)}
.sel{width:100%;padding:6px 8px;border:1px solid #CCC;border-radius:3px;font-size:13px;font-weight:600;color:#1A1A1A;background:#fff;outline:none}
.irow{display:flex;align-items:stretch;border:1px solid #CCC;border-radius:3px;overflow:hidden;background:#fff}
.irow:focus-within{border-color:rgb(9,87,151)}
.irow .px{padding:0 8px;background:#F0F4F8;border-right:1px solid #E0E0E0;font-size:12px;color:#555;display:flex;align-items:center;flex-shrink:0}
.irow .sx{padding:0 8px;font-size:12px;color:#555;display:flex;align-items:center;flex-shrink:0}
.irow input{flex:1;padding:6px 9px;border:none;outline:none;font-size:13px;font-weight:700;color:#1A1A1A;background:transparent;min-width:0}
.rl{display:flex;justify-content:space-between;font-size:10px;color:#888;margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.g5{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:7px}
.chk{display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer}
.chk input{width:15px;height:15px;cursor:pointer;accent-color:rgb(9,87,151)}

/* Buttons */
.btn{padding:6px 14px;border-radius:3px;border:none;font-size:13px;font-weight:600}
.btn:hover{opacity:.87}
.bsm{padding:4px 10px;font-size:12px;border-radius:3px}
.bpr{background:rgb(9,87,151);color:#fff;border:1px solid rgb(9,87,151)}
.bgh{background:#fff;border:1px solid #CCC;color:#555}
.bdg{background:#fff;border:1px solid #fecaca;color:#991b1b}
.bic{padding:4px 8px;font-size:12px;border-radius:3px;border:1px solid #E0E0E0;background:#fff}

/* Segment */
.seg{display:flex;gap:4px;flex-wrap:wrap}
.sb{padding:5px 12px;border-radius:3px;font-size:12px;font-weight:600;border:1px solid #CCC;background:#fff;color:rgb(9,87,151)}
.sb.on{background:rgb(9,87,151);color:#fff;border-color:rgb(9,87,151)}

/* Risk */
.rb{display:flex;gap:7px}
.rbi{flex:1;padding:8px 5px;border-radius:3px;border:1px solid #CCC;background:#fff;font-size:12px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px}
.rbi small{font-size:10px;font-weight:400;opacity:.72}

/* Account cards */
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:9px}
.acard{background:#fff;border:1px solid #CCC;border-radius:4px;overflow:hidden}
.ast{height:4px}
.abd{padding:12px}
.ahd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
.att{display:flex;align-items:center;gap:7px}
.aac{display:flex;gap:4px}
.asts{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px}
.astat{background:#F0F4F8;border-radius:3px;padding:5px 8px}
.slbl{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.sval{font-size:12px;font-weight:700;color:#1A1A1A}
.abadge{padding:3px 8px;border-radius:3px;font-size:10px;font-weight:700;display:inline-block;margin-right:3px;margin-bottom:3px}

/* Withdrawal cards */
.wcard{background:#fff;border:1px solid #CCC;border-radius:4px;overflow:hidden;margin-bottom:8px}
.wst{height:3px;background:rgb(9,87,151)}
.wbd{padding:11px}
.wflds{display:flex;flex-wrap:wrap;gap:7px;align-items:flex-end;margin-top:9px}
.wf{display:flex;flex-direction:column;gap:3px}

/* Alerts */
.alert{padding:8px 11px;border-radius:3px;font-size:12px;line-height:1.6;display:flex;gap:7px;align-items:flex-start;margin-bottom:6px}
.ai{font-size:15px;flex-shrink:0;margin-top:1px}
.al-info  {background:#E6EFF7;border-left:3px solid rgb(9,87,151)}
.al-warn  {background:#FFF8F0;border:1px solid rgba(196,86,0,.28);border-left:3px solid #C45600}
.al-danger{background:#fff0f0;border-left:3px solid #dc2626}
.al-ok    {background:#EDFAF1;border-left:3px solid #1E7E34}

/* Info boxes */
.ib{padding:8px 11px;border-radius:3px;font-size:11px;line-height:1.65}
.ib-bl{background:#E6EFF7;color:#444}
.ib-mu{background:#F0F4F8;color:#555}
.ib-or{background:#FFF8F0;color:#C45600}
.ib-gr{background:#EDFAF1;color:#1E7E34}

/* Canvas */
canvas{display:block;width:100%}
.legend{display:flex;gap:13px;flex-wrap:wrap;padding:5px 13px 9px;font-size:12px;color:#555}
.li{display:flex;align-items:center;gap:4px}
.ll{width:20px;height:2px;border-radius:1px;flex-shrink:0;display:inline-block}
.la{width:13px;height:9px;border-radius:2px;flex-shrink:0;display:inline-block}

/* Portfolio table */
.ptbl{width:100%;border-collapse:collapse;font-size:12px}
.ptbl thead tr{background:rgb(9,87,151);color:#fff}
.ptbl th{padding:7px 10px;text-align:right;font-size:11px;white-space:nowrap;font-weight:700}
.ptbl th:first-child{text-align:left}
.ptbl td{padding:6px 10px;border-bottom:1px solid #E0E0E0;text-align:right;color:#1A1A1A}
.ptbl td:first-child{text-align:left;font-weight:700;color:rgb(9,87,151)}
.ptbl tr:nth-child(even) td{background:#F7F9FB}
.ptbl tr.ms td{background:#E6EFF7!important;font-weight:700}
.ptbl tr.dep td{background:#fff0f0!important;color:#dc2626}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:none;align-items:center;justify-content:center;padding:14px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:4px;width:100%;max-width:560px;max-height:93vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.22)}
.mh{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #E0E0E0;font-size:14px;font-weight:700}
.mb{padding:14px;display:flex;flex-direction:column;gap:11px}
.mf{padding:11px 14px;border-top:1px solid #E0E0E0;display:flex;justify-content:flex-end;gap:7px}
.mx{border:none;background:none;font-size:21px;color:#999;line-height:1}
.otrow{display:flex;gap:7px;align-items:flex-end;margin-bottom:5px}

/* Timeline Flux */
.tl-wrap{overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch}
.tl-container{position:relative;display:flex}
.tl-side{display:flex;flex-direction:column}
.tl-axis{flex-shrink:0;position:relative}
.tl-axis-line{position:absolute;left:50%;top:0;bottom:0;width:2px;background:#CCC;transform:translateX(-1px)}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:9px;height:9px;border:2px solid rgba(255,255,255,.28);border-top-color:rgb(240,150,134);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <h1>RetirePlan QC</h1>
    <p>Placements · FERR · Inflation · Monte Carlo · Impôts Québec/Canada</p>
    <div class="or-bar"></div>
  </header>
  <nav class="nav" id="nav"></nav>
  <main class="main" id="main"></main>
</div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script>
'use strict';

/* ══════════════════════════════
   CONSTANTES
══════════════════════════════ */
const FERR_RATES={71:.0528,72:.054,73:.0553,74:.0567,75:.0582,76:.0598,77:.0617,78:.0636,79:.0658,80:.0682,81:.0708,82:.0738,83:.0771,84:.0808,85:.0851,86:.0899,87:.0955,88:.1021,89:.1099,90:.1192,91:.1306,92:.1449,93:.1634,94:.1879};
const ferrRate=age=>age<71?0:(FERR_RATES[Math.min(age,94)]??0.20);
const CELI_PLAFOND=7000,REER_PLAFOND=31560,REER_PLAFOND_P=0.18;

const C={bleu:'rgb(9,87,151)',bleuPale:'#E6EFF7',or:'rgb(240,150,134)',vert:'#1E7E34',orange:'#C45600',violet:'#6F42C1',rouge:'#dc2626',gris:'#555',grisC:'#E0E0E0',bord:'#CCC',fond:'#F0F4F8',blanc:'#FFF'};

const ACCT={
  REER:  {label:'REER',          icon:'🏦',color:C.bleu,  tax:"Déductible · Imposable au retrait"},
  CELI:  {label:'CÉLI',          icon:'🌱',color:C.vert,  tax:"Retraits libres d'impôt"},
  NONREG:{label:'Non enregistré',icon:'📈',color:C.orange,tax:"50% des gains en capital imposables"},
  IMMO:  {label:'Immobilier',    icon:'🏠',color:C.violet,tax:"Valeur nette estimée"},
  AUTRE: {label:'Autre actif',   icon:'💼',color:C.gris,  tax:"Actif personnalisé"},
};
const RISK={low:{label:'Faible',vol:.05,color:C.vert},medium:{label:'Modéré',vol:.12,color:C.orange},high:{label:'Élevé',vol:.20,color:C.rouge}};
const STRAT={
  'smart':    {label:'REER + CÉLI optimal',order:null,
    desc:"🎯 REER jusqu'au montant personnel de base (~15 705$) net des revenus gouvernementaux, puis CÉLI."},
  'celi-first':{label:'CÉLI d\'abord',order:['CELI','NONREG','REER','IMMO','AUTRE'],
    desc:"✅ CÉLI (libre d'impôt) → Non enregistré → REER (imposable)."},
  'reer-first':{label:'REER d\'abord',order:['REER','NONREG','CELI','IMMO','AUTRE'],
    desc:"📋 Vider le REER/FERR avant la conversion obligatoire à 71 ans."},
  'balanced': {label:'Proportionnel',order:null,
    desc:"⚖️ Retraits proportionnels selon la valeur de chaque compte."},
};
const TABS=[
  {id:'dashboard',  icon:'📊',label:'Tableau de bord'},
  {id:'accounts',   icon:'💰',label:'Placements'},
  {id:'withdrawals',icon:'📉',label:'Retraits'},
  {id:'flux',       icon:'📅',label:'Flux'},
  {id:'params',     icon:'⚙️',label:'Paramètres'},
  {id:'monte',      icon:'🧠',label:'Monte Carlo'},
];

let _uid=0;
const uid=()=>'u'+(++_uid);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const $=id=>document.getElementById(id);
const clone=o=>JSON.parse(JSON.stringify(o));
const fmtK=v=>{if(!isFinite(v)||isNaN(v))return'—';const a=Math.abs(v);if(a>=1e6)return(v/1e6).toFixed(1)+'M$';if(a>=1e3)return(v/1e3).toFixed(0)+'k$';return Math.round(v)+'$';};
const fmtCAD=v=>Math.round(v).toLocaleString('fr-CA')+'\u202f$';

/* ══════════════════════════════
   STATE
══════════════════════════════ */
const S={
  tab:'dashboard',
  accounts:[
    {id:uid(),name:'REER',type:'REER',balance:50000,
     portfolioStart:25,portfolioEnd:95,
     contribAmt:10000,contribFreq:'annual',contribStart:25,contribEnd:65,
     oneTime:[],rate:6,risk:'medium'},
    {id:uid(),name:'CÉLI',type:'CELI',balance:20000,
     portfolioStart:25,portfolioEnd:95,
     contribAmt:6000,contribFreq:'annual',contribStart:25,contribEnd:65,
     oneTime:[],rate:5,risk:'low'},
  ],
  withdrawals:[
    {id:uid(),name:'Retraite',startAge:65,endAge:100,amount:45000,type:'fixed',freq:'annual',indexed:true,adaptive:false,adaptiveThreshold:200000,adaptiveReduction:25},
  ],
  params:{ageFrom:25,ageTo:95,salary:80000,ageRRQ:65,ageSV:65,ageSRG:60,strategy:'smart',inflation:2.0,rebalance:false},
  sim:[],mc:null,mcRunning:false,acctBalsAtRetirement:{},depletionAge:null,modalAcct:null,
};

/* ══════════════════════════════
   FINANCE
══════════════════════════════ */
const randNorm=()=>{let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);};
const calcRRQ=(age,aR,sal)=>{if(age<aR)return 0;let b=Math.min(sal*.25,15888),d=aR-65;if(d<0)b*=(1+d*.054);else if(d>0)b*=(1+Math.min(d,7)*.042);return b;};
const calcSV=(age,aS)=>age<aS?0:8000*(1+.072*Math.max(0,aS-65));
const calcSRG=(age,aS,aSG,inc,sv)=>(age<aS||age<aSG)?0:Math.max(0,12000-Math.max(0,inc-sv)*.5);
const calcTax=inc=>{
  if(inc<=0)return 0;
  const fb=[55867,111733,173205],fr=[.15,.205,.26,.33],qb=[49275,98540,119910],qr=[.15,.20,.2575,.2975];
  let t=0,p=0;
  for(let i=0;i<4;i++){const l=i<fb.length?fb[i]:inc+1;t+=Math.max(0,Math.min(inc,l)-p)*fr[i];p=l;if(inc<=l)break;}
  p=0;for(let i=0;i<4;i++){const l=i<qb.length?qb[i]:inc+1;t+=Math.max(0,Math.min(inc,l)-p)*qr[i];p=l;if(inc<=l)break;}
  return Math.max(0,t-.30*15705);
};
const annualContrib=a=>a.contribFreq==='monthly'?a.contribAmt*12:a.contribAmt;
const reerPlafond=salary=>Math.min(REER_PLAFOND,Math.round(salary*REER_PLAFOND_P));

function buildOrder(strategy,accounts){
  const order=STRAT[strategy]?.order;
  if(!order)return accounts.map(a=>a.id);
  const byT={};accounts.forEach(a=>(byT[a.type]=byT[a.type]||[]).push(a.id));
  const ids=[];order.forEach(t=>(byT[t]||[]).forEach(id=>ids.push(id)));
  accounts.forEach(a=>{if(!ids.includes(a.id))ids.push(a.id);});
  return ids;
}

/* ══════════════════════════════
   SIMULATION
══════════════════════════════ */
function runSim(accounts,withdrawals,params,shocks){
  if(!accounts.length)return{rows:[],acctBals:{}};
  const{ageFrom,ageTo,salary,ageRRQ,ageSV,ageSRG,strategy,inflation,rebalance}=params;
  // Tous les soldes commencent à 0 — injection au portfolioStart
  const bal={};accounts.forEach(a=>(bal[a.id]=0));
  const pids=buildOrder(strategy,accounts);
  const inflRate=(inflation||0)/100;
  let acctBals={},rows=[];
  const wBase={};withdrawals.forEach(w=>{wBase[w.id]=w.freq==='monthly'?w.amount*12:w.amount;});

  for(let age=ageFrom;age<=ageTo;age++){
    const yr=age-ageFrom;

    /* 1. Injection du capital initial + croissance dans l'horizon de placement */
    accounts.forEach(a=>{
      const pS=a.portfolioStart??ageFrom;
      const pE=a.portfolioEnd??ageTo;
      if(age===pS) bal[a.id]+=a.balance; // injection du capital initial
      if(age<pS||age>pE) return;          // hors horizon de placement
      const vol=(RISK[a.risk]||RISK.medium).vol;
      const rebalVol=rebalance?vol*0.80:vol;
      const sh=shocks&&shocks[a.id]?(shocks[a.id][yr]||0):randNorm()*rebalVol*0;
      const shFinal=shocks?sh:0;
      bal[a.id]=Math.max(0,bal[a.id]*(1+a.rate/100+shFinal));
    });

    /* 2. Contributions récurrentes (dans l'horizon de placement ET de contribution) */
    accounts.forEach(a=>{
      const pS=a.portfolioStart??ageFrom;
      const pE=a.portfolioEnd??ageTo;
      if(age<pS||age>pE) return;
      if(age<a.contribStart||age>a.contribEnd) return;
      bal[a.id]+=(a.contribFreq==='monthly'?a.contribAmt*12:a.contribAmt);
    });

    /* 3. Contributions ponctuelles */
    accounts.forEach(a=>(a.oneTime||[]).forEach(ot=>{if(ot.age===age)bal[a.id]+=ot.amount;}));

    if(age===ageRRQ) acctBals={...bal};
    const totalBefore=Object.values(bal).reduce((s,v)=>s+v,0);
    const rrq=calcRRQ(age,ageRRQ,salary),sv=calcSV(age,ageSV),srg=calcSRG(age,ageSV,ageSRG,0,sv),gov=rrq+sv+srg;

    /* 4. FERR minimum obligatoire (71+) */
    let ferrTotal=0;
    if(age>=71){
      const fRate=ferrRate(age);
      accounts.filter(a=>a.type==='REER').forEach(a=>{
        const minW=bal[a.id]*fRate;
        bal[a.id]=Math.max(0,bal[a.id]-minW);
        ferrTotal+=minW;
      });
    }

    /* 5. Retraits planifiés (indexation + adaptatif) */
    let needed=0;
    withdrawals.forEach(w=>{
      if(age<w.startAge||age>w.endAge)return;
      let amt;
      if(w.type==='percent'){amt=totalBefore*(w.amount/100);}
      else{
        let base=wBase[w.id];
        if(w.indexed)base*=Math.pow(1+inflRate,Math.max(0,age-w.startAge));
        if(w.adaptive&&totalBefore<(w.adaptiveThreshold||200000))base*=(1-(w.adaptiveReduction||25)/100);
        amt=base;
      }
      needed+=amt;
    });

    /* 6. Décaissement */
    const totalAvail=gov+ferrTotal;
    let fp=Math.max(0,needed-totalAvail);
    if(strategy==='smart'){
      const BPA=15705,reerFree=Math.max(0,BPA-totalAvail);
      let fromR=Math.min(fp,reerFree),rem=fp;
      accounts.filter(a=>a.type==='REER').forEach(a=>{if(fromR<=0)return;const t=Math.min(bal[a.id]||0,fromR);bal[a.id]-=t;fromR-=t;rem-=t;});
      accounts.filter(a=>a.type==='CELI').forEach(a=>{if(rem<=0)return;const t=Math.min(bal[a.id]||0,rem);bal[a.id]-=t;rem-=t;});
      accounts.filter(a=>a.type!=='REER'&&a.type!=='CELI').forEach(a=>{if(rem<=0)return;const t=Math.min(bal[a.id]||0,rem);bal[a.id]-=t;rem-=t;});
      accounts.filter(a=>a.type==='REER').forEach(a=>{if(rem<=0)return;const t=Math.min(bal[a.id]||0,rem);bal[a.id]-=t;rem-=t;});
    } else if(STRAT[strategy]?.order){
      pids.forEach(id=>{if(fp<=0)return;const t=Math.min(bal[id]||0,fp);bal[id]-=t;fp-=t;});
    } else {
      const tt=Object.values(bal).reduce((s,v)=>s+v,0)||1;
      accounts.forEach(a=>{bal[a.id]=Math.max(0,bal[a.id]-(bal[a.id]/tt)*fp);});
    }

    const totalBal=Math.round(Object.values(bal).reduce((s,v)=>s+v,0));
    const tax=Math.round(calcTax(Math.max(0,ferrTotal+fp)));
    rows.push({age,totalBalance:totalBal,rrq,sv,srg,gov,ferr:Math.round(ferrTotal),withdrawal:Math.round(needed),tax,net:Math.round(gov+ferrTotal+fp-tax)});
    if(totalBal<=0){for(let a2=age+1;a2<=ageTo;a2++)rows.push({age:a2,totalBalance:0,rrq,sv,srg,gov,ferr:0,withdrawal:Math.round(needed),tax:0,net:Math.round(gov)});break;}
  }
  return{rows,acctBals};
}

function runMC(accounts,withdrawals,params,N=200){
  if(!accounts.length)return null;
  const runs=[];let ok=0;
  for(let i=0;i<N;i++){
    const sh={};
    accounts.forEach(a=>{
      const vol=(RISK[a.risk]||RISK.medium).vol*(params.rebalance?0.80:1);
      sh[a.id]={};for(let y=0;y<=params.ageTo-params.ageFrom+1;y++)sh[a.id][y]=randNorm()*vol;
    });
    const{rows}=runSim(accounts,withdrawals,params,sh);runs.push(rows);
    if((rows[rows.length-1]?.totalBalance||0)>0)ok++;
  }
  const len=runs[0]?.length||0,cd=[];
  for(let i=0;i<len;i++){
    const vals=runs.map(r=>r[i]?.totalBalance||0).sort((a,b)=>a-b);
    const p=f=>Math.max(0,vals[Math.floor(N*f)]||0);
    cd.push({age:runs[0][i].age,p10:p(.10),p25:p(.25),p50:p(.50),p75:p(.75),p90:p(.90)});
  }
  return{chartData:cd,successRate:Math.round(ok/N*100),N};
}

function getSuggestions(){
  const tips=[],sr=S.mc?S.mc.successRate:100;
  const avgR=S.accounts.length?S.accounts.reduce((s,a)=>s+a.rate,0)/S.accounts.length:0;
  if(sr<70)tips.push({cls:'al-danger',icon:'🚨',text:`Probabilité de succès à ${sr}%. Augmentez les contributions ou réduisez les retraits.`});
  else if(sr<85)tips.push({cls:'al-warn',icon:'⚠️',text:`Probabilité ${sr}%. Ajouter 5 000$/an dans le CÉLI améliorerait votre retraite.`});
  if(!S.accounts.some(a=>a.type==='CELI'))tips.push({cls:'al-info',icon:'🌱',text:"Aucun CÉLI. Les retraits y sont totalement libres d'impôt."});
  if(S.params.ageRRQ<65)tips.push({cls:'al-info',icon:'🕐',text:`RRQ à ${S.params.ageRRQ} ans = pénalité de ${((65-S.params.ageRRQ)*5.4).toFixed(0)}%. Attendre 70 ans ajoute 42%.`});
  if(S.accounts.length&&avgR<4)tips.push({cls:'al-info',icon:'📈',text:`Rendement moyen ${avgR.toFixed(1)}%/an. Des FNB diversifiés ciblent 6–8% sur 20+ ans.`});
  if(S.depletionAge)tips.push({cls:'al-danger',icon:'💸',text:`Le portefeuille s'épuise à ${S.depletionAge} ans.`});
  return tips.slice(0,4);
}

function compute(){
  const{rows,acctBals}=runSim(S.accounts,S.withdrawals,S.params,null);
  S.sim=rows;S.acctBalsAtRetirement=acctBals;

const niceMax=v=>{if(!v||v<=0)return 1;const m=Math.pow(10,Math.floor(Math.log10(v)));return Math.ceil(v/m)*m;};
const CAP=5000000;

function setupCv(id){
  const cv=$(id);if(!cv)return null;
  const dpr=window.devicePixelRatio||1,W=cv.offsetWidth||600,H=cv.offsetHeight||300;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);return{cv,ctx,W,H};
}

function drawMainChart(id){
  const s=setupCv(id);if(!s)return;
  const{ctx,W,H}=s,pad={t:12,r:14,b:22,l:56},iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  if(iW<=0||iH<=0||!S.sim.length)return;
  const sim=S.sim,mc=S.mc,ages=sim.map(r=>r.age),n=sim.length;
  let max=0;sim.forEach(r=>{if(r.totalBalance>max)max=r.totalBalance;});
  if(mc)mc.chartData.forEach(r=>{if(r.p90>max)max=r.p90;});
  max=Math.min(CAP,niceMax(max));
  ctx.clearRect(0,0,W,H);
  [0,.25,.5,.75,1].forEach(f=>{const y=pad.t+iH*(1-f);ctx.strokeStyle=C.grisC;ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+iW,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=C.gris;ctx.font='9px Arial';ctx.textAlign='right';ctx.fillText(fmtK(max*f),pad.l-4,y+3);});
  const step=n>60?10:n>30?5:n>15?2:1;
  ctx.fillStyle=C.gris;ctx.font='9px Arial';ctx.textAlign='center';
  ages.forEach((age,i)=>{if(age%step!==0)return;const x=pad.l+(i/(n-1||1))*iW;ctx.fillText(age,x,pad.t+iH+14);});
  ctx.strokeStyle=C.grisC;ctx.lineWidth=1;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,pad.t+iH);ctx.lineTo(pad.l+iW,pad.t+iH);ctx.stroke();
  const px=(i,v)=>({x:pad.l+(i/(n-1||1))*iW,y:pad.t+iH-(Math.min(v,max)/max)*iH});
  if(mc&&mc.chartData.length){
    const D=mc.chartData,nd=D.length,pmc=(i,v)=>({x:pad.l+(i/(nd-1||1))*iW,y:pad.t+iH-(Math.min(v,max)/max)*iH});
    ctx.beginPath();D.forEach((d,i)=>{const p=pmc(i,d.p10);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});for(let i=nd-1;i>=0;i--){const p=pmc(i,D[i].p90);ctx.lineTo(p.x,p.y);}ctx.closePath();ctx.fillStyle='rgba(9,87,151,.07)';ctx.fill();
    ctx.beginPath();D.forEach((d,i)=>{const p=pmc(i,d.p25);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});for(let i=nd-1;i>=0;i--){const p=pmc(i,D[i].p75);ctx.lineTo(p.x,p.y);}ctx.closePath();ctx.fillStyle='rgba(9,87,151,.17)';ctx.fill();
    ctx.beginPath();D.forEach((d,i)=>{const p=pmc(i,d.p50);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});ctx.strokeStyle=C.violet;ctx.lineWidth=1.5;ctx.setLineDash([6,3]);ctx.stroke();ctx.setLineDash([]);
  }
  sim.forEach((r,i)=>{if(r.age%5!==0||r.totalBalance===0)return;const p=px(i,r.totalBalance);ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle=C.bleu;ctx.fill();ctx.fillStyle=C.bleu;ctx.font='bold 8px Arial';ctx.textAlign='center';ctx.fillText(fmtK(r.totalBalance),p.x,p.y-7<pad.t+10?p.y+14:p.y-7);});
  const ri=sim.findIndex(r=>r.age>=S.params.ageRRQ);
  if(ri>=0){const rx=pad.l+(ri/(n-1||1))*iW;ctx.strokeStyle='rgba(9,87,151,.35)';ctx.lineWidth=1;ctx.setLineDash([5,3]);ctx.beginPath();ctx.moveTo(rx,pad.t);ctx.lineTo(rx,pad.t+iH);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=C.bleu;ctx.font='bold 9px Arial';ctx.textAlign='left';ctx.fillText('Retraite',rx+3,pad.t+12);}
  if(S.depletionAge){const di=sim.findIndex(r=>r.age===S.depletionAge);if(di>=0){const dx=pad.l+(di/(n-1||1))*iW;ctx.strokeStyle='rgba(220,38,38,.5)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(dx,pad.t);ctx.lineTo(dx,pad.t+iH);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=C.rouge;ctx.font='bold 9px Arial';ctx.textAlign='right';ctx.fillText('Épuisement',dx-3,pad.t+12);}}
  const g=ctx.createLinearGradient(0,pad.t,0,pad.t+iH);g.addColorStop(0,'rgba(9,87,151,.27)');g.addColorStop(1,'rgba(9,87,151,.02)');
  ctx.beginPath();sim.forEach((r,i)=>{const p=px(i,r.totalBalance);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
  ctx.lineTo(px(n-1,0).x,pad.t+iH);ctx.lineTo(pad.l,pad.t+iH);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();sim.forEach((r,i)=>{const p=px(i,r.totalBalance);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
  ctx.strokeStyle=C.bleu;ctx.lineWidth=2.5;ctx.stroke();
}

/* ══════════════════════════════
   PAGE: FLUX (Timeline)
══════════════════════════════ */
function pageFlux(){
  const{ageFrom,ageTo,ageRRQ,ageSV}=S.params;
  const totalYears=ageTo-ageFrom;
  const PX=Math.max(9,Math.min(15,620/Math.max(totalYears,1)));
  const H=totalYears*PX;
  const ITEM_W=160,GAP=5,AXIS_W=70;
  const toY=age=>(Math.max(ageFrom,Math.min(ageTo,age))-ageFrom)*PX;
  const toH=(s,e)=>Math.max(2,(Math.min(ageTo,e)-Math.max(ageFrom,s))*PX);

  /* Assignation de lanes (pas d'overlap dans la même lane) */
  function assignLanes(items){
    const ends=[];
    return items.sort((a,b)=>a.s-b.s).map(it=>{
      let l=0;while(ends[l]!==undefined&&ends[l]>it.s)l++;
      ends[l]=it.e;return{...it,l};
    });
  }

  /* ── Éléments gauche : placements ── */
  const leftRaw=[];
  S.accounts.forEach(a=>{
    const def=ACCT[a.type]||ACCT.AUTRE;
    const pS=Math.max(a.portfolioStart??ageFrom,ageFrom);
    const pE=Math.min(a.portfolioEnd??ageTo,ageTo);
    if(pS>ageTo||pE<ageFrom)return;
    const cS=Math.max(a.contribStart,ageFrom),cE=Math.min(a.contribEnd,ageTo);
    const ann=annualContrib(a);
    leftRaw.push({
      s:pS,e:pE,lbl:a.name,col:def.color,icon:def.icon,
      // Sous-barre de contribution (relative à la barre principale)
      cS:cS>=pS&&cE<=pE?cS:null,cE:cS>=pS&&cE<=pE?cE:null,
      cSub:ann>0?(a.contribFreq==='monthly'?fmtK(a.contribAmt)+'/mois':fmtK(ann)+'/an'):'',
      projBal:S.acctBalsAtRetirement[a.id],
    });
    (a.oneTime||[]).forEach(ot=>{
      if(ot.age>=ageFrom&&ot.age<=ageTo)
        leftRaw.push({s:ot.age,e:ot.age,lbl:a.name,col:def.color,icon:def.icon,pt:true,sub:fmtK(ot.amount)+' (unique)'});
    });
  });

  /* ── Éléments droite : retraits ── */
  const rightRaw=[];
  S.withdrawals.forEach(w=>{
    if(w.startAge>ageTo||w.endAge<ageFrom)return;
    const ann=w.type==='fixed'?(w.freq==='monthly'?w.amount*12:w.amount):null;
    rightRaw.push({s:Math.max(w.startAge,ageFrom),e:Math.min(w.endAge,ageTo),lbl:w.name,sub:ann?fmtK(ann)+'/an'+(w.indexed?' +infl.':''):w.amount+'% portef.',col:C.rouge});
  });
  rightRaw.push({s:Math.max(ageRRQ,ageFrom),e:ageTo,lbl:'RRQ',sub:'Rente de retraite',col:C.vert});
  rightRaw.push({s:Math.max(ageSV,ageFrom),e:ageTo,lbl:'SV + SRG',sub:'Prestations fédérales',col:C.bleu});
  if(S.accounts.some(a=>a.type==='REER')&&ageTo>71)
    rightRaw.push({s:Math.max(71,ageFrom),e:ageTo,lbl:'FERR minimum',sub:'Obligatoire (ARC)',col:C.orange});

  const left=assignLanes(leftRaw);
  const right=assignLanes(rightRaw);
  const maxL=left.length?Math.max(...left.map(i=>i.l))+1:1;
  const maxR=right.length?Math.max(...right.map(i=>i.l))+1:1;

  /* ── Rendu d'un élément gauche (placement avec sous-barre contribution) ── */
  function leftItemEl(it){
    const y=toY(it.s);
    if(it.pt){
      // Point (unique)
      return`<div style="position:absolute;right:${it.l*(ITEM_W+GAP)+ITEM_W/2-6}px;top:${y-6}px;
        width:12px;height:12px;border-radius:50%;background:${it.col};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:5"
        title="${esc(it.lbl)}: ${esc(it.sub)}"></div>`;
    }
    const h=toH(it.s,it.e);
    const offset=it.l*(ITEM_W+GAP);
    // Barre principale (horizon de placement)
    let inner='';
    if(it.cS!==null&&it.cE!==null){
      const cy=toY(it.cS)-toY(it.s); // offset relatif dans la barre
      const ch=toH(it.cS,it.cE);
      inner=`<div style="position:absolute;left:0;right:0;top:${cy}px;height:${ch}px;background:${it.col}44;border-radius:2px;border-left:3px solid ${it.col};padding:2px 6px;overflow:hidden">
        <div style="font-size:10px;color:${it.col};font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${it.cSub}</div>
      </div>`;
    }
    const projStr=it.projBal!=null?`<div style="font-size:9px;color:${C.bleu};margin-top:1px">${fmtK(it.projBal)} à ${S.params.ageRRQ}a</div>`:'';
    return`<div style="position:absolute;right:${offset}px;top:${y}px;width:${ITEM_W}px;height:${h}px;
      background:${it.col}0E;border:1px solid ${it.col}44;border-right:3px solid ${it.col};
      border-radius:3px;overflow:hidden;z-index:2;position:absolute">
      <div style="padding:3px 7px;position:relative;z-index:1">
        <div style="font-weight:700;font-size:11px;color:${it.col};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${it.icon||''}${esc(it.lbl)}</div>
        ${projStr}
      </div>
      ${inner}
    </div>`;
  }

  /* ── Rendu d'un élément droit (retrait) ── */
  function rightItemEl(it){
    const y=toY(it.s);
    const h=toH(it.s,it.e);
    const offset=it.l*(ITEM_W+GAP);
    return`<div style="position:absolute;left:${offset}px;top:${y}px;width:${ITEM_W}px;height:${h}px;
      background:${it.col}0E;border:1px solid ${it.col}44;border-left:3px solid ${it.col};
      border-radius:3px;padding:3px 8px;overflow:hidden;z-index:2">
      <div style="font-weight:700;font-size:11px;color:${it.col};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(it.lbl)}</div>
      ${h>22?`<div style="font-size:10px;color:${C.gris};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(it.sub)}</div>`:''}
    </div>`;
  }

  /* ── Marqueurs d'âge sur l'axe ── */
  const keyAges=new Set([ageFrom,ageTo,ageRRQ,ageSV,71]);
  S.accounts.forEach(a=>{
    const pS=a.portfolioStart??ageFrom,pE=a.portfolioEnd??ageTo;
    keyAges.add(pS);keyAges.add(pE);keyAges.add(a.contribStart);keyAges.add(a.contribEnd);
  });
  S.withdrawals.forEach(w=>{keyAges.add(w.startAge);keyAges.add(w.endAge);});

  const marks=[];
  for(let age=ageFrom;age<=ageTo;age++){if(age%5===0||keyAges.has(age))marks.push(age);}

  const axisHTML=marks.map(age=>{
    const y=toY(age);
    const key=keyAges.has(age);
    const icon=age===ageRRQ?' ★':age===71?' 🔄':age===ageSV&&ageSV!==ageRRQ?' 🌿':'';
    return`
      ${key?`<div style="position:absolute;top:${y}px;left:-500px;right:-500px;height:1px;background:#EBEBEB;z-index:0"></div>`:''}
      <div style="position:absolute;left:50%;top:${y-9}px;transform:translateX(-50%);
        font-size:${key?11:9}px;font-weight:${key?700:400};color:${key?C.bleu:C.gris};
        background:#fff;padding:1px 6px;white-space:nowrap;z-index:5;border-radius:2px;
        ${key?`box-shadow:0 0 0 1px ${C.grisC}`:''}">
        ${age}${icon}
      </div>`;
  }).join('');

  const LEFT_W=maxL*(ITEM_W+GAP);
  const RIGHT_W=maxR*(ITEM_W+GAP);
  const minW=LEFT_W+AXIS_W+RIGHT_W+20;

  return`
    <div class="sec-head">
      <div class="sec-num">1</div>
      <div class="sec-title">Flux financiers — Timeline</div>
      <div class="sec-line"></div>
    </div>
    <!-- En-têtes colonnes -->
    <div style="display:flex;margin-bottom:10px;font-size:12px;font-weight:700">
      <div style="flex:1;text-align:right;padding-right:${AXIS_W/2+8}px;color:${C.bleu}">DÉPÔTS ⟶</div>
      <div style="flex:1;padding-left:${AXIS_W/2+8}px;color:${C.rouge}">⟵ RETRAITS</div>
    </div>
    <!-- Timeline scrollable -->
    <div style="overflow-x:auto;overflow-y:visible">
      <div style="position:relative;height:${H+24}px;min-width:${minW}px">
        <!-- Axe central vertical -->
        <div style="position:absolute;left:50%;top:0;height:${H+24}px;width:2px;background:${C.grisC};transform:translateX(-1px);z-index:3"></div>
        <!-- Marqueurs d'âge (centrés sur l'axe) -->
        <div style="position:absolute;left:50%;top:0;width:${AXIS_W}px;height:${H+24}px;transform:translateX(-50%);overflow:visible;z-index:4">
          ${axisHTML}
        </div>
        <!-- Dépôts (gauche, s'étendent vers la gauche depuis l'axe) -->
        <div style="position:absolute;right:calc(50% + ${AXIS_W/2}px);top:0;height:${H+24}px;width:${LEFT_W+10}px;overflow:visible">
          ${left.map(leftItemEl).join('')}
        </div>
        <!-- Retraits (droite, s'étendent vers la droite depuis l'axe) -->
        <div style="position:absolute;left:calc(50% + ${AXIS_W/2}px);top:0;height:${H+24}px;width:${RIGHT_W+10}px;overflow:visible">
          ${right.map(rightItemEl).join('')}
        </div>
      </div>
    </div>
    <!-- Légende -->
    <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:14px;font-size:11px;color:${C.gris};border-top:1px solid ${C.grisC};padding-top:9px">
      <span><b>Barre extérieure</b> = Horizon de placement (durée de vie du compte)</span>
      <span><b>Barre intérieure colorée</b> = Horizon de contribution récurrente</span>
      <span>★ Début RRQ &nbsp;·&nbsp; 🔄 REER→FERR (71a) &nbsp;·&nbsp; 🌿 Début SV/SRG</span>
    </div>`;
}

          <div>
            <div style="font-size:10px;color:${C.gris};margin-bottom:3px">Fin (âge)</div>
            <input class="inp" type="number" value="${pE}" min="${S.params.ageFrom}" max="${S.params.ageTo}" data-a="ma-pend">
          </div>
        </div>
        <div class="ib ib-mu" style="margin-top:5px">Le solde initial est injecté à l'âge de début. La croissance s'arrête à l'âge de fin, mais le solde reste disponible au décaissement.</div>
      </div>

      <hr class="dv">

      <!-- Horizon de contribution récurrente -->
      <div>
        <label class="lbl" style="margin-bottom:6px">Horizon de contribution récurrente</label>
        <div class="g5">
          <div style="grid-column:span 2"><div style="font-size:10px;color:${C.gris};margin-bottom:3px">Montant</div><input class="inp" type="number" value="${a.contribAmt}" data-a="ma-camount"></div>
          <div><div style="font-size:10px;color:${C.gris};margin-bottom:3px">De (âge)</div><input class="inp" type="number" value="${a.contribStart}" data-a="ma-cstart"></div>
          <div><div style="font-size:10px;color:${C.gris};margin-bottom:3px">À (âge)</div><input class="inp" type="number" value="${a.contribEnd}" data-a="ma-cend"></div>
          <div><div style="font-size:10px;color:${C.gris};margin-bottom:3px">Fréq.</div>
            <select class="sel" data-a="ma-cfreq">
              <option value="annual"  ${a.contribFreq==='annual' ?'selected':''}>Ann.</option>
              <option value="monthly" ${a.contribFreq==='monthly'?'selected':''}>Mens.</option>
            </select></div>
        </div>
        ${annWarn}
        <div class="ib ib-mu" style="margin-top:5px;font-size:10px">💡 Doit être compris dans l'horizon de placement.</div>
      </div>

      <hr class="dv">

      <!-- Contributions ponctuelles -->
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <label class="lbl">Contributions ponctuelles</label>
          <button class="btn bsm" style="border:1px solid ${def.color};background:${def.color}10;color:${def.color}" data-a="add-ot">+ Ajouter</button>
        </div>
        ${!(a.oneTime?.length)?`<p style="font-size:11px;color:${C.gris};font-style:italic">Ex : héritage, bonus, vente d'actif…</p>`:''}
        ${otRows}
      </div>
    </div>
    <div class="mf">
      <button class="btn bgh" data-a="close-modal">Annuler</button>
      <button class="btn bpr" data-a="save-modal">Enregistrer</button>
    </div>`;
}

function saveModal(){
  const a=S.modalAcct;if(!a)return;
  if(a._new){delete a._new;S.accounts.push(a);}
  else{const i=S.accounts.findIndex(x=>x.id===a.id);if(i>=0)S.accounts[i]=a;}
  closeModal();compute();renderMain();
}

/* ══════════════════════════════
   RENDER
══════════════════════════════ */
function updateNav(){
  $('nav').innerHTML=TABS.map(t=>`<button class="tab-btn ${S.tab===t.id?'on':''}" data-a="tab" data-v="${t.id}">${t.icon} ${t.label}</button>`).join('')
    +`<div style="margin-left:auto;display:flex;align-items:center;font-size:11px;color:rgba(255,255,255,.52);padding:0 4px">${S.mcRunning?`<span class="spin"></span>Simulation…`:`${S.accounts.length} compte${S.accounts.length!==1?'s':''}`}</div>`;
}
function renderMain(){
  const pages={dashboard:pageDashboard,accounts:pageAccounts,withdrawals:pageWithdrawals,flux:pageFlux,params:pageParams,monte:pageMonte};
  $('main').innerHTML=(pages[S.tab]||pageDashboard)();
  requestAnimationFrame(refreshChart);
}
function render(){updateNav();renderMain();}

/* ══════════════════════════════
   EVENTS
══════════════════════════════ */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-a]');if(!el)return;
  const a=el.dataset.a,v=el.dataset.v,i=el.dataset.i!==undefined?+el.dataset.i:null;
  if(a==='tab')        {S.tab=v;render();return;}
  if(a==='close-modal'){closeModal();return;}
  if(a==='save-modal') {saveModal();return;}
  if(a==='add-acct')   {openModal({id:uid(),name:'Nouveau',type:'CELI',balance:0,portfolioStart:S.params.ageFrom,portfolioEnd:S.params.ageTo,contribAmt:5000,contribFreq:'annual',contribStart:S.params.ageFrom,contribEnd:S.params.ageFrom+40,oneTime:[],rate:5,risk:'medium',_new:true});return;}
  if(a==='edit-acct')  {openModal(S.accounts[i]);return;}
  if(a==='del-acct')   {S.accounts.splice(i,1);compute();renderMain();return;}
  if(a==='add-w')      {S.withdrawals.push({id:uid(),name:'Retrait',startAge:65,endAge:100,amount:30000,type:'fixed',freq:'annual',indexed:true,adaptive:false,adaptiveThreshold:200000,adaptiveReduction:25});renderMain();return;}
  if(a==='del-w')      {S.withdrawals.splice(i,1);compute();renderMain();return;}
  if(a==='strategy')   {S.params.strategy=v;compute();renderMain();return;}
  if(!S.modalAcct)return;
  const ma=S.modalAcct;
  if(a==='ma-risk'){ma.risk=v;renderModal();return;}
  if(a==='add-ot') {(ma.oneTime=ma.oneTime||[]).push({id:uid(),age:35,amount:10000});renderModal();return;}
  if(a==='del-ot') {ma.oneTime.splice(i,1);renderModal();return;}
});

document.addEventListener('change',e=>{
  const el=e.target,a=el.dataset.a;if(!a)return;
  if(a==='w-indexed')  {S.withdrawals[+el.dataset.i].indexed=el.checked;compute();renderMain();return;}
  if(a==='w-adaptive') {S.withdrawals[+el.dataset.i].adaptive=el.checked;compute();renderMain();return;}
  if(a==='param-check'){S.params[el.dataset.k]=el.checked;compute();renderMain();return;}
  if(a==='w-type')     {S.withdrawals[+el.dataset.i].type=el.value;compute();renderMain();return;}
  if(a==='w-freq')     {S.withdrawals[+el.dataset.i].freq=el.value;compute();renderMain();return;}
  if(a==='ma-type')    {S.modalAcct.type=el.value;renderModal();return;}
  if(a==='ma-cfreq')   {S.modalAcct.contribFreq=el.value;renderModal();return;}
});

document.addEventListener('input',e=>{
  const el=e.target,a=el.dataset.a;if(!a)return;
  if(a==='param')       {S.params[el.dataset.k]=+el.value;compute();return;}
  if(a==='param-range') {S.params[el.dataset.k]=+el.value;compute();renderMain();return;}
  if(a==='w-field')     {S.withdrawals[+el.dataset.i][el.dataset.k]=+el.value;compute();return;}
  if(a==='w-name')      {S.withdrawals[+el.dataset.i].name=el.value;return;}
  if(a==='w-threshold') {S.withdrawals[+el.dataset.i].adaptiveThreshold=+el.value;compute();return;}
  if(a==='w-reduction') {S.withdrawals[+el.dataset.i].adaptiveReduction=+el.value;compute();return;}
  if(!S.modalAcct)return;
  const ma=S.modalAcct;
  if(a==='ma-name')    {ma.name=el.value;return;}
  if(a==='ma-balance') {ma.balance=+el.value;return;}
  if(a==='ma-rate')    {ma.rate=+el.value;return;}
  if(a==='ma-camount') {ma.contribAmt=+el.value;return;}
  if(a==='ma-cstart')  {ma.contribStart=+el.value;return;}
  if(a==='ma-cend')    {ma.contribEnd=+el.value;return;}
  if(a==='ma-pstart')  {ma.portfolioStart=+el.value;return;}
  if(a==='ma-pend')    {ma.portfolioEnd=+el.value;return;}
  if(a==='ot-age')     {ma.oneTime[+el.dataset.i].age=+el.value;return;}
  if(a==='ot-amount')  {ma.oneTime[+el.dataset.i].amount=+el.value;return;}
});

$('overlay').addEventListener('click',e=>{if(e.target===$('overlay'))closeModal();});
window.addEventListener('resize',()=>requestAnimationFrame(refreshChart));

/* ══════════════════════════════
   INIT
══════════════════════════════ */
compute();
render();
</script>
</body>
</html>
